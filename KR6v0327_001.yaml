body:
  text: 宗喀巴上師造湯薌銘翻譯榮增堪布審定高觀如屬文吳劍君證語敬禮孺童相妙吉祥菩薩摩訶薩敬禮運大悲心者荷極難荷歷劫行現證大覺演妙音廣覺有情諸眠惑此由大覺法界主授以補佛法王位世間自在無能勝以清淨藏護有情觸彼如意蓮足塵隨應成滿諸吉祥恭敬依戴補佛子敬禮聖者無著足無能勝尊演妙法於菩薩行所受學修習次第如理示樂上乘者應諦持其有妄許為大乘而於菩薩取捨處盲無慧目失分別或有唯持語念誦而於上乘所應修諸菩薩行第一道聖教不能決定求放逸捨失牟尼義彼彼內心迷正道有如無鈎大象馳若上乘種非下劣於此具緣極樂聞妙吉祥本續中記莂云有名無著苾芻者解了論藏真實義善能抉擇諸契經一切了義不了義復能開演世間智又能分別論本義此是圓證持明者亦名世間調御使彼有真言具威力善能生起殊妙慧為令聖教久住持撰攝契經真實義住世之年百五十寂後現身於佛國雖於生死輪回中永得嘗諸安樂味當來究竟最第一獲得無上大菩提謂聖者無著菩薩行勝妙法發廣大願於多生中積集無量無等資糧精誠修習證法光定能令自他究竟解脫如度大海悉到彼岸善具抉擇諸法之力為餘有情之所難量於慈尊所廣聞無量無算之法別於上乘行果廣大理趣圓滿聽受結集要義撰述大論菩薩地品若有於上乘道本少修習知解力弱精進力微於諸學處不能觀達為令此等劣慧有情易於知解故釋菩薩地戒波羅蜜品簡述其義菩薩行者以何等處為所依止應如聖教最先發起勝菩提心於菩薩學願修學者應以持戒為其要行若或不能學菩薩學於任何時不能趣得無上菩提是故持戒乃為三世菩薩行處第一要道菩薩地中說此三戒即是一切求大菩提過去菩薩已學一切未來菩薩當學十方世界無量無邊現在菩薩今學又戒疏云凡諸士夫啓發無上菩提心者入大乘門求自他利復求精進福慧資糧而自誓為大乘行者即應住於菩薩淨戒若於波羅蜜中所說菩薩學處不事修習或不敬信即自許為大乘行者僅是言音決非真實是故發菩提心不於學處如實深信而修習者不能取得無上菩提求菩提者應以學處而為要道精勤修學聖三戒經云護光若有趣菩薩乘善男子善女人等適聞此法不能生於如實深信終不能得阿耨多羅三藐三菩提何以故由修學故證彼菩提非不修學而能得證若不修習得菩提者貓兔等類亦應證得無上菩提何以故不正行者不能證得無上覺故何以故若不正行得菩提者音聲言說亦應證得無上菩提作如是言我當作佛我當作佛以此語故無邊衆生應成正覺若謂行持菩薩淨戒僅是顯乘所應修學非是密乘菩薩行道之所須要如是思者是大邪見三菩提金剛空行金剛頂等經云最勝無上菩提心我今如應而發起於淨律儀戒學處及攝善法妙尸羅饒益有情三勝戒一一堅固而受持是謂欲持金剛乘戒先於三戒應誓願學又於所係五部佛戒續應敬持謂如依據曼陀羅軌亦在護持共與不共二種之戒所謂共者菩薩戒是故凡發心行持菩薩學者應於三戒或六度中而修學之此外別無大乘波羅蜜道故此為密乘四續部中任趣何部所必需故復次發菩提心與六度行是顯密乘所共之道是故密乘一切時中於此二道不應棄捨又如妙吉祥本續云修密乘者應具三法而得圓滿何等為三一者不捨一切有情二者護持菩薩淨戒律儀三者不自棄失所修祕法又如金剛頂經云於六波羅蜜行中如其次第修學者即能利益諸有情是名能行菩薩行又如金剛幔經第十二品云我今發勝菩提心廣攝堪憫諸有情依勝菩提行修習為利有情願成佛此二種乘於戒學處開遮有別本體唯一當知顯乘及與密乘任趣何道應持戒故今釋戒品略分為二一者總攝二者分釋言總攝者云何菩薩一切戒略言其相有九種戒自性一切難一切門善士一切種遂求二世樂清淨如是九種相是名略說戒此中自性戒者是戒總相一切戒者於戒體相廣分別故難行戒者甚難修習非是尋常所能行故一切門戒者於一切行能分別故善士戒者能作殊勝依止故一切種戒者於諸相種廣分別故遂求戒者如大疏中離他苦惱由境與行有遷異故此世他世樂戒清淨戒者並是得果殊勝謂由捨得方便而有別故分釋有六一者略詮自性二者廣說一切三者論彼差別四者言戒勝利五者攝集戒相六者說戒行業初詮自性此復有二一者戒性二者勝益初戒性中有四功德謂自性戒功德總具四種一者從他正受功德二者善淨意樂功德三者犯已還淨功德四者深敬專念無有違犯功德言功德者謂由從他正受故於戒學處有犯因緣即外觀他譏毀不正便於惡作深生愧恥由善淨意樂故於所學戒有犯因緣即便內顧恐復牽引自所持法便於惡作深起慚羞由犯已還淨無有違犯二種相故離諸惡作由是菩薩從他正受善淨意樂為依止故生起慚愧由慚愧故無有違犯犯已還淨能善防護所受尸羅由防護故不見有墮離諸惡作以是而言諸受戒者應當如理慧觀自心數觀察已離諸愧悔於粗細墮至皆不見便能生起勝清淨心由是從初不染過失設有失念過患染污亦不猶豫悉遣無餘發露悔滅令得還淨如是行已復當生起大慚愧心既生起已當受戒時即應從一性相具足善知識所求受淨戒受戒意樂非是隨他由自思擇非依命等下劣意樂應依勝妙意樂而受斯二因緣當善專注此四功德如餘疏中多說初一為受後三為護本論則說初二功德是能護因菩薩戒二十頌云以此勝妙之意樂從彼具有勝智力住戒上師而受之謂初二功德屬於受戒後二功德屬於護戒故又諸菩薩欲受戒時若不會遇具德上師即得觀想諸佛菩薩現臨在前而從受之然以從他補特伽羅受戒為正若復值有善知識者應即前往叩訪求請從受淨戒從師受已歡喜恭敬護持所學能速出生清淨之戒學集論云言持戒者當於菩薩學處真實修習從具戒者受諸淨戒如是行者若於所學有所違越當起慚羞恐於上師有所欺誑生恐懼心由慚羞故不假專勵即能生起歡喜恭敬是故一切菩薩於諸學處欲得隨應以成就者應向佛前而正受學所言功德因果之相當知前二功德能引後二前二是因後二是果引發之相如前所說言功德數有其四種能淨尸羅二類所攝謂無有違犯犯已還淨由從他正受善淨意樂深敬專念無有違犯如是三者應知能令不毀菩薩所受淨戒由犯已還出應知能令墮已還淨復出生故由是二類即說為四餘諸疏中攝集如是四種功德述有四相一者初一功德為受後三功德為護二者意樂功德有一加行功德有三三者謂有意樂正受與三自性戒言正受者復有三相或自鄭重啓請而受或為他作福田而受或為獲自在主遠離損惱有情而受言三自性戒者亦有三相謂所受戒所犯還淨及防護戒四者淨戒二因及與二果二者勝益有其四種一者妙善淨戒二者無量淨戒三者饒益一切有情戒四者能獲大果勝利戒初言妙善淨戒謂於如是具四功德自性尸羅從他正受受已隨學復能發生諸種利益一者自利謂諸聲聞於自利時了知諸諦於諸煩惱及諸苦苦獲得遠離少事少業唯事修習自身寂滅或自調伏若諸菩薩於自利時即斷二執而證二智二者利他謂初發心時即欲廣於有性無性二種有情而作利益云何利益無性有情謂於現前救護令離惡趣未生諸惡令其不生若已生者即令棄捨是名菩薩利益衆生之行復能導彼入諸樂趣於未生善令其出生既生起已復令增長是名菩薩安樂衆生之行又於彼諸無性有情多具瞋恨無有善緣已成邪器墮入惡趣為於彼等而作導引利益安樂意樂不捨恆常期待是名菩薩哀憫世間之行云何利益有性有情謂能導諸有性有情至沙門果是名菩薩利益一切人天之行云何利益謂能導彼令由資糧加行二位至沙門果故又復令他現生住安樂地身心輕快嘗解脫樂是名菩薩安樂之行由是行者即於菩薩妙善淨戒無所謬惑自餘疏中於此戒益尚多舉說今未具列二者無量淨戒攝受無量菩薩學故三者饒益諸有情戒謂於行證二種時中恆常利樂諸有情故四者能獲大果勝利戒謂在菩薩位中自求圓滿菩提大果若趣佛位能以此果施與他等獲大勝利云何名大勝利謂諸聲聞等須具三學乃有初中後善菩薩但於戒中悉具諸善謂初發心時廣說利益自他一切是為初善饒益一切有情是為中善大果勝利是為後善二者廣說一切此復有三一所受戒二受戒法三防護戒初復有四一者分別二者自性三者因緣具足四者圓集要義初說分別謂菩薩一切戒略有二種一者所依分別所依有二一在家菩薩二出家菩薩及餘屬此二衆菩薩如是彼彼所依止戒是則名為一切戒由各依止受學一切戒故是名在家菩薩出家菩薩復次大德最勝子云三種趣中若諸惡趣及彼天趣唯自然受有在家戒若在人趣有二種戒又薩穆札疏云若在惡趣及色界天不從他受唯自然受有在家戒欲界人天有二種受謂自然受與從他受是故並有在家出家二種之戒如是菩薩淨律儀戒死後流轉亦不捨失隨其所生自然獲得取要言之菩薩淨戒雖復死後流轉三趣而能持續永不捨失其言在家出家二種別者由諸菩薩於勤策等五出家戒能具與否而有別故二者自性分別謂即依此在家出家二分淨戒略說三種一律儀戒二攝善法戒三饒益有情戒如是三戒能攝一切菩薩所持之戒云何說名如是三戒如餘疏中有二種說有說聲聞乘中三種律儀即同此數謂別解脫律儀降伏煩惱靜慮律儀暫息諸緣無漏律儀永斷一切有說菩薩之行起於二種謂自成熟與成熟他由自成熟遠離惡作攝集善行乃有律儀善法二種淨戒由成熟他應持饒益有情之戒是為菩薩三戒定義如是二說應依後義云何說名如是三戒次第謂如薩穆札疏云遠離戒者共諸聲聞後二戒以之為因故行則不共故行不共者自未得度不能度他自未滅息不能息他若先未有攝善法戒不能成就饒益有情是故說名如是次第二者自性此復有三初律儀戒謂諸菩薩所受七衆別解脫律儀如苾芻戒苾芻尼戒正學女戒勤策男戒勤策女戒屬出家戒品近事男戒近事女戒屬在家戒品又別解脫戒原有八種今此不列近住戒者謂如菩薩戒二十頌難釋云唯於一晝夜受持者非是難行非能離欲非能恆常持續故此不列至若薩穆札疏中則謂近住戒者近事男女所正止住故爾不列言近住攝於近事戒中非如實語又彼疏言正學女戒攝於苾芻尼戒亦復不應道理問然則菩薩淨律儀戒是否即在七衆戒外若言是者即與菩薩地說相違以菩薩地中於七衆外未說餘戒故若言否者則言別解脫戒死後流轉即便捨失如是具淨律儀菩薩死後流轉淨律儀戒亦應捨失諸天人等雖復發心修學菩薩三戒亦終不能獲得菩薩淨律儀戒答若出家菩薩具菩薩戒於五種別解脫中隨所受持即律儀戒若在家菩薩具菩薩戒於近事男女二種別解脫中隨所受持即律儀戒若諸天人不必依於別解脫戒亦能得有菩薩淨戒如遠離戒謂遠離十不善業或復遠離身口七不善業及遠離性罪此為七種別解脫戒與菩薩淨律儀戒一切共相非是別解脫戒之別相故道炬論疏云菩薩律儀戒者謂防護制罪之七種別解脫戒及防護性罪戒防護十不善戒此中初是別解脫體後與七衆別解脫共故又牟尼護念莊嚴論云律儀戒者是止息戒謂應如實遠離七惡而能生起無貪無瞋正見三種善法故同論又云既生起已復由具戒增上力故即能成滿十善業道菩薩戒二十頌難釋亦云菩薩地中所說律儀戒者謂諸菩薩所受七衆別解脫律儀當知別解脫律儀是菩薩戒支分而是一體故故具別解脫律儀者即為正受菩薩戒器得受菩薩所學文句此中止息殺生等律與別解脫非有別異故若復未能止息諸業不成正受菩薩戒器謂由不欲止息殺生等業不能生起菩薩戒器故當思止息之義同別解脫是以菩薩地中即謂七種別解脫戒與菩薩律儀戒同一體故如後所言具菩薩戒身口七支於殺生等亦有開者然與止息殺生別解脫異而亦無過謂除酒外餘諸制罪於患病時亦得開許此不同於苾芻戒法由取苾芻戒者應為離一切欲而受非為擇一支分而受菩薩律儀除於身口七支方便開許餘亦應如別解脫戒寧捨生命防護不犯道炬論云七種別解脫律儀恆與餘戒能相應於菩薩淨戒堪能其他一切皆非是以是而言若先未有隨七種別解脫戒相不復堪能生起淨戒律儀謂無七別解脫遠離性罪共相不復堪能生起菩薩淨戒非謂無有七種別解脫戒別相即不生起菩薩淨戒道炬論疏云論頌所說為示淨戒殊勝依止故此在菩提賢論師疏中已詳說之今為攝集其義略述之耳此義在昔有二種說有說應依別解脫者謂欲生起菩薩律儀及欲安住菩薩律儀應當依止別解脫戒有說不依別解脫者謂別解脫是聲聞乘當思能障菩薩律儀故應依者云既說有菩薩別解脫即應有大小兩乘七衆別解脫於此即以不損惱他為七衆別解脫共相應當依止普於有恩諸有情所不損惱故至如大小兩乘別解脫戒所差異者謂相續不斷將護他心犯已還淨常樂利他此是大乘別解脫戒彼則反是若不分別其不共相是諸菩薩依於小乘別解脫者即是相違菩薩實以大乘別解脫為正學處為所依止無相違過寶雲經云別解脫律儀與菩薩學有別異故復次大乘七衆受戒護戒應當如諸毗奈耶行上來所說不應道理若謂菩薩律儀當依七衆別解脫律儀而生起者則天人等不能生起菩薩律儀若謂定依別解脫為所安住則是死後流轉在在生處恆常不捨別解脫戒天人旁生亦有苾芻是故生起菩薩律儀非須依止別解脫戒牟尼護念莊嚴論亦云若謂近事男近事女勤策男勤策女正學女苾芻苾芻尼各應畢生隨其所宜住於七衆別解脫戒乃能正受菩薩律儀若不如是不能生起菩薩律儀如是言者是未通達大乘經義若謂無別解脫律儀不能生起菩薩律儀者則是爾時菩薩藏中及其論疏應當說言別解脫戒為菩薩學之根本處復應說言決定當依於別解脫猶如大乘菩提道中決定當依三皈依行是故菩薩地中以律儀戒說為七衆別解脫者當知此有二分謂根本七衆別解脫戒及其遠離性罪共於菩薩律儀戒相非唯七衆別解脫戒故此中別解脫戒遠離性罪共於菩薩律儀戒相與所受菩薩律儀同等生起彼與菩薩律儀能依所依無分別故即先未受根本七衆別解脫戒菩薩律儀亦能生起雖能生起然應如法依別解脫謂當先受在家出家隨一別解脫戒若不爾者即於佛說次第有所踰越故譬如未受勤策律儀即便直受苾芻律儀雖能生起然不應爾不依者云若未能離自利意樂不得生起菩薩律儀是名菩薩律儀生起之障若先已具菩薩律儀而復生起自利意樂毀失菩薩淨律儀戒是名菩薩律儀安住之障如其所說則是陷於別解脫戒小乘意樂二種差別不分辨過是故生起菩薩律儀應即捨棄小乘意樂而不應捨別解脫戒若復已具大乘律儀而乃生起小乘意樂即是毀失大乘律儀至別解脫不應棄捨由別解脫兩乘共故因意樂故捨別解脫不應道理若先具有別解脫戒即是最勝能受戒者由彼所依能具足故若以住菩薩戒而捨別解脫戒則是毀裂佛說根株使彼利樂衆生禾稼遭大冰雹即是不能解悟經典前後要義如是倒見當永棄捨制止如是倒見生起故如聖三戒經云常應順奉如前所說別解脫教護光世若有人於別解脫起違背想則為於佛力無所畏而生違背彼若於佛力無所畏生違背者則於去來現在諸佛而生違背由此未來所受異熟無量大苦假使三千大千世界一切衆生受地獄苦比前衆生所受苦毒百分不及一千分不及一百千俱胝乃至算數譬喻塢波尼殺曇分亦不及一若欲遠離如是苦惱應當遠離如是種類惡行苾芻縱遠相去千踰繕那亦應遙避何況近耶若但聞名尚應棄捨何況見聞而不遠離又妙臂菩薩請問經云如一切穀依於地由彼無愆而生長如是白法依於戒悲水浸潤能生起佛於毗奈耶藏中宣說別解脫淨戒在家密乘除儀則自餘一切悉應持謂在家密乘者除出家行儀作業軌則不共制戒凡毗奈耶中所說諸取捨處亦當受持何況出家密乘具菩薩律儀者伽濕彌羅善逝寶頂吉祥智友尊者亦復於其下劣倒見力駁廣釋引申正義謂如不違淨戒律儀本誓論云此有出家者先住顯密戒後以愚暗故於所住律中聲聞之戒學別解脫問年所說諸學處多不能守護復謂聲聞律違異菩薩戒乃取菩薩戒而捨出家律又云棄捨出家律即於顯密戒亦不堪受持又云具勝慧聖者大菩薩苾芻方便而善巧夢中念無失諸契經中亦廣說諸轉輪聖王在家菩薩久遠修習菩薩之行尚復捨家希求出家受具足戒是故住大乘者應於一切別解脫戒尤應於彼出家律儀愛護受持次說攝善法戒此復有三一者略攝謂諸菩薩受菩薩戒後所有一切為大菩提由諸身語積集諸善總說名為攝善法戒諸論疏謂此受菩薩戒後一語應改作受律儀戒後其義有三一者時謂正受後如經中云住於戒中積集諸善謂住於戒乃能生起善法安住善法增長善法故此由正受菩薩律儀便能攝集一切善故應先堅固律儀淨戒二者所緣謂所有一切為大菩提由自成熟一切佛法此由攝善法者是自成熟饒益有情是成熟他是名二戒所緣分別三者自相或云自性謂由身語積集諸善不言意者如餘疏云攝善法戒時唯身口戒故然廣疏中數說意善德光疏中亦說意善謂身語中自有意力故未說意此說可據又菩薩戒二十頌難釋與道炬疏則謂在論本中當有意字如是身語意三各別所作或復身語二門所作或復三門所作善業是名攝善法戒二者廣說此復有八一者生起三慧謂菩薩依止安住律儀淨戒應除散亂聽取經法尋求聞慧積聞資糧覺起思慧次修止觀即入修慧復應於樂獨處精勤修學身離憒鬧心離不善諸惡尋思戒二十頌難釋於此亦云當樂獨處此中修止是為定學其聞思慧及修觀者是為慧學由戒學處生起二故二者積集福田資糧若見尊長應離憍慢悅豫歡慶讚言善來問訊禮拜侍立獻座若於座中即從座起恭敬起立或疾起立見至面前合掌敬禮或供給使恭敬承事又於病者悲憫殷重瞻侍供給如是總有三田謂恩者尊長疾苦三種福田初是父母次是師長後是病人是名出家在家二衆菩薩生起福德根本之田三者隨喜功德與有德者於演正法讚歎三寶諸妙說等施以善哉於彼具足聞等功德補特伽羅真誠讚美於諸有情一切福業以勝意樂發言隨喜又善知他是應供處心生歡悅遠離嫉妒雖非自作所獲功德與自作等又復隨喜於他善業視如己作深生歡悅四者安忍他來損惱方便思擇視作夙業起悲憫心不懷瞋忿亦不還報五者回向發願謂令所作不壞失故生起廣大諸福德故應以三門已作今作種種善業回向無上正等菩提又為成熟無量功德於時時中如十地經或如行願品所說發起十種大願六者供養三寶於三寶前以一切種財物行持二分供事而作上妙廣大供養七者住不放逸恆常勇猛精進修習六波羅蜜一切善品八者修習資糧道中諸善於諸學處正念正知正身正語正行防守密護根門不令隨逐諸可意境不可意境生起貪瞋為護根故應當護心又或過飽或過饑者即便不能精勤修習故當如量不有二過調適其身於食知足復以夜中分作三分中夜睡眠初夜後夜及與永晝或勤讀誦或修瑜伽又復親近修善捨惡諸勝善友依止授法諸善知識更以自心作自知識於自愆犯深諦觀察審知現後所有過失善能對治悉使消除其已犯者若有勝緣遇佛菩薩即當向彼啓白懺露如法悔除若不會遇當於十方諸佛菩薩像前或同法者所啓白懺露如法悔除三者攝義謂如是等類所有引攝護持增長諸善法戒是名菩薩攝善法戒言引攝者謂能生起三慧故言護持者謂既生起已令不壞故如修安忍若不滅瞋便能摧毀所集善故言增長者謂既護持已復令增長廣大圓滿如是回向發廣大願三者饒益有情戒云何菩薩饒益有情戒當知此戒略有十一相謂於應助伴者於愚癡者於有恩者遭怖畏者於憂苦者乏資具者求依止者於應隨順於他意者應正入者應逆轉者應以神通調伏之者如其所應為作義利三者因緣具足此有三種一者律儀戒因緣具足謂諸菩薩住律儀戒云何善護律儀戒此有十支一者不顧過去諸欲謂諸菩薩捨轉輪王人中勝欲而出家已不顧王位如棄草穢所言欲者是所希求謂諸物欲即所受用所言欲者是內希求謂煩惱欲即內貪愛是則名為根本諸欲言不顧者於彼物欲作掃除想如捨塵草不復返顧菩薩捨欲亦復如是於所貪著視為不實亦捨不顧又於愛欲作不淨想捨彼腐穢後不復顧菩薩捨欲亦復如是於內煩惱視作腐穢亦捨不顧於先捨棄在家受用而出家已若復重顧便於律儀不獲清淨應捨貪愛作二種想如前二喻堅固憶持二者不樂未來諸欲謂於未來世天魔王宮他化天中所受用欲亦不願求而修梵行何況餘欲言不樂者謂當如實觀念彼欲猶如充滿虎豹稠林不樂趣入上說不顧過去欲者唯說人欲未言天欲以律儀戒重在出家天中無有出家者故此說不樂未來欲者唯說天欲未言人欲以天魔王宮所受用欲最增上故於未來時尚不希求何況人欲取要言之出家律儀應極清淨應善護持不為希求未來諸欲而修梵行非唯不顧過去諸欲三者不耽現在諸欲謂於國王長者尊貴有情上妙利養恭敬諸欲尚不味著何況於餘卑賤有情所有下劣利養恭敬應以正慧如實審觀如食反吐不復味嘗此應專注若為願求未來諸欲而修梵行僅是善願然不名持別解脫戒此於在家律儀戒中非應絶對棄捨過去所得受用復不貪著現在諸欲若在出家應當絶對棄捨彼欲若復不能回轉其心如前觀想三界輪回更觀欲界所有過患當知不能善護淨戒四者樂遠離處謂身樂獨靜若處衆中遠離諸欲尋思而住不唯於是尸羅律儀而生喜足當依淨戒勤修無量菩薩等持為令引發證得自在蓋謂若唯於戒喜足而不尋求最勝功德當知不能成滿淨戒五者言論尋思悉皆清淨雖處雜衆不發諸惡雜染言論雖居遠離亦善防護不起少分如貪欲等諸惡尋思或時失念暫爾現行尋便發起深見其過猛利悔愧若能依此數數修習雖復暫起不正言思而能速疾安住正念於彼獲得無復作心由此因緣則能拘檢習拘檢故漸能如昔於彼二事喜樂現行於今不樂現行亦爾謂能逆轉二心令不生起從初精進令不現行設或現行即便棄捨深見其過猛利悔愧前念後念逆轉而住是名遮止不如理行清淨尸羅無上聖教六者不自輕蔑若聞已入大地諸菩薩衆在無量劫中久遠修行廣大無量不可思不可議三戒學處如捨身等他所難行應當滅除驚懼怯劣之心自謂不能而生輕蔑云何滅除應作是念彼既是人漸次修學乃至成滿於諸學處非是頓爾我亦是人漸次修學精進不捨決定得如彼所成就生淨意樂若聞如是無量學處莫堪修學便生輕捨或復自念此是餘諸菩薩所作非我堪能而生棄捨是名障礙菩薩力種當如前說捨除怯劣真實勇猛精勤修習暫雖不能而亦自念我於所學終可成就生多意樂而勤修行如是積善淨除諸惡發廣大願七者柔和常察己過不伺他非而不令他心生苦惱若爾他過可放任耶答曰不也若見他在煩惱法中生起悲憫云何生起謂此非是補特伽羅所有過失由煩惱力不獲自在於諸凶暴犯戒有情無損害心無瞋恚心深生悲憫欲作饒益又復為他作善知識常欲令彼發菩提心捨諸煩惱不令增上乃至獲得無上菩提八者堪忍雖復遭他手足塊石刀杖等觸之所加害曾不生起少分恨心豈復於彼出粗惡言或行捶打由是漸次於身口意三門清淨薩穆札疏云於大損惱尚能忍受豈復於他作不饒益毀辱訶責忿恨報復少分惡心亦不現起又本論云況復以毀辱八風少分苦觸作不饒益此謂於打罵等尚不生起恚恨報害況復如彼謂如於他所施少分損惱安忍不動而正安住沙門四法九者不放逸行謂前際後際中際先時俱時五種不放逸行如其次第於過去時所有違犯如法悔除於未來時亦應如是審諦思惟於現在時亦忘念猛利自誓我當如如所應行如如所應住令無所犯如是如是行如是如是住不起毀犯由依止故如是如是若行若住是名最要別解脫學處不放逸行如是五種不放逸行第四為本若有四者能生第五若未生五而起違犯如其次第如法悔除十者軌則淨命並皆具足初說軌則或云淨行謂不為名聞誇揚自善不行覆藏發露己惡得劣少者少欲無憂得多美者知足不貪堪忍寒熱餓渴等苦所求不得心無憂戚諸根柔善安靜不掉不隨境轉間靜不躁威儀妙好如理作意威儀寂靜次說淨命謂離矯詐等五邪命法由六因緣雖已防護而非善護一者唯少防護便謂滿足二者語言作意不能清淨三者自行輕蔑四者不能攝御徒衆五者有所違犯不能悔除六者軌則與命皆不清淨初復有二一者雖護身語而意希求三世諸欲二者雖能護意不樂依戒引發等持德光論師云不能攝御徒衆者謂不能攝受堪忍淨戒徒衆故二者攝善法戒因緣具足此有二種五品具足初者五波羅蜜漸次如其次第於五違逆悉皆遠離謂於身財少生慳貪尚不忍受又於一切犯戒因緣根本煩惱少分煩惱忿恨等生亦不忍受於生恚害怨恨等心亦不忍受於諸善業懈怠不進倚臥傾欹懶惰不敬亦不忍受又於所起等至味著等至煩惱沉沒掉舉亦不忍受以要言之諸違逆品若生起者勤加對治或加遮遏決不增上隨彼而轉次者慧波羅蜜漸次謂當如實了知善處勝利又能如實了知善因又能如實了知善果倒與無倒又如實知攝善法障遠離如是五無知障所言勝利者當有三種謂人與天及菩提果所言因者即顯高處勝善之因如十善等謂依善友聽聞正法思惟修等言倒與無倒者於求善果即便視為常樂我淨是名為倒若反觀之即名無倒謂諸菩薩獲得善果不於無倒見為倒故如是了知六波羅蜜善果勝利及彼善因又復了知遠離如前所說違逆六度之障攝集六度所有善根即能速疾攝集諸善謂世出世間一切善品悉皆攝於六度中故若能遠離六度逆品即能便易攝集諸善如是漸次名速成就施等之因三者饒益有情戒因緣具足謂有十一相名住一切饒益有情戒於一一相中成就一切種即如助伴一相應作一切有情助伴以一切相而作助伴如酬恩時於十一種一一有情如其所應以十一相而作饒益云何十一相一者於應助伴而作饒益此復有二一於事業為作助伴二於苦惱為作助伴初於事業為作助伴復有八種一者思量所作事業謂當思量於他有情或作不作致盛衰故為作助伴二者功用所作事業現前決定為作助伴此二即名意念加行二種助伴三者謂於道路若往若來或無行旅或路壅毀皆為導伴四者事業加行助伴方便開示如耕種事無不詳盡五者守護所有財物方便開示今他守護所有資財不被竊盜之所劫取六者和合乖離解怨修好七者義會謂於擇期修諸福業八者修福謂彼不能擇期修福助彼修之德光論師云如是初二助伴令彼資財未得者得事業加行守護財物令已得者增長護持後二助伴令增長者修習供養二於苦惱為作助伴復有二種一者身苦此復有四一者於諸疾病施藥瞻侍二者於根殘缺盲者往向引趣其道聾者取捨曉以手勢三者於支不具或以身荷或以車乘載赴其處四者於行疲乏施以食住調身撫摩二者心苦此復有三一者於蓋障苦為貪欲等五蓋所纏示以聖言令其開解二者於無間苦為八尋思之所縛苦說法對治令其開解八尋思者一欲二恚三害四親里五國土六不死七他來輕侮八族姓相應族姓相應者謂資財族姓具足欲樂自在豪貴自許三者於他蔑他勝苦謂當告以世間戰鬥勝負等苦說無我等出世間法令其開解二者於昧理者為作饒益謂於惡行異熟所起苦惱有情為說正法令其回轉止息惡行云何為說正法謂以相應文句等八種法答彼三問具四功德而為說之一者於不知問應說相應文句助伴之法謂以無倒和合之義而酬答之二者於相違問應說隨順清亮之法謂以隨順法爾前後不相違義而酬答之三者於二種問應說有用相稱更說應順常委分資糧法而酬答之言有用者謂以方便令其解悟言相稱者如量調伏令彼了知言應順者應順世間所立功德言常委分資糧法者謂就聖道資糧而答德光論師云何謂常委即恆勤守護謂恆時恭敬制諸煩惱將護其心故此與最勝子說同後二種法德光謂是由解增上而為酬答最勝子謂由證增上而為酬答又此所說雖云三問顯係四問言相應者得名助伴先後不違故言隨順者得名清亮順法爾故言有用者得名相稱如量調伏故言應順者得名常委順淨行故譬如甚深甘美可意善了樂聞五種音聲如其次第得名震吼悅耳喜樂明亮無不順適五聲德光云如是於每二句得以後句引攝前義於一切問以四功德而為酬答謂前後不違法爾不違調伏不違勝義不違論中又謂或復方便善巧宣說謂於犯戒惡行有情依八文句如法開示令止惡行如是於行慳行有情為說施等而調治之乃至說法令諸瞋恨堅固有情方便開解是則名為方便善巧又於現法求財寶者為示方便令彼有情正少功力集多財寶守護無失又於聖教懷憎疾者示現神變方便說法令起淨信入佛聖教又於已入佛聖教者令斷於見所斷煩惱證清淨見超諸惡趣又於已證入見道者為示方便更斷餘結三者於有恩所為作饒益暫見申敬讚言善來怡顏歡慰祥處設座正言令坐財利供養若等若增現前酬恩非以下劣於彼事業雖不求請尚應助伴況乎有命如是乃至於現神通驚恐引攝廣作饒益四者於諸怖害能為救護謂於原野所棲獅虎豹害大小水中諸鱗介害是名旁生二種怖害國王威勢諸黜罰害強盜劫賊所侵奪害財寶中斷及怨敵害家主宰官權勢之害是名人中四種布害復於不具資財善行辨說三可愛事或不活畏或惡名畏或有大衆威德之畏非人之畏非人有二一者異生魍魎二者咒換起尸如是等畏皆為救護五者於他憂惱令其開解此復有二一於親屬別離憂惱二於財寶別離憂惱初於親屬別離憂惱復有五種一者別離生親謂喪父母二者別離所攝及果有親謂喪妻子三者別使役親謂喪奴婢及諸僮僕四者別恩惠親謂喪宗長朋友內外族因親屬五者別離示導利益親屬謂喪親教軌範上師共淨行者二於財寶別離憂惱復有二種一者能共世間一切苦因二者不共一切世間苦因共一切者謂或王賊之所侵奪或火所燒或水所溺不共有二一者自不如理守護二者由他致令散失初不如理守護又復有二一不如理守護資財謂為矯詐之所誑誘二不如理運置資財謂由事業無方損失二由他致散失亦復有二一者不獲支配所有財苦謂為怨敵非理橫取有疏亦作或為惡親非理橫取二者由自家室所起憂苦謂家生火之所耗費有疏亦作家生敗種之所耗費由如是等親屬財寶別離因緣出生軟中上品愁憂為說無常令其開解所言軟中上品愁憂者謂父母喪亡是上品憂奴婢喪亡是中品憂財寶喪失是下品憂當知此是自所需用及可愛者六者於缺資具為作饒益此復有六一者於彼資生匱乏苦者求諸飲食給與飲食二者於疲勞苦給與車乘三者於慚羞苦求衣與衣求莊嚴具與莊嚴具彼不具衣與莊嚴具起慚羞故四者於彼缺乏資具苦者求諸什物施以什物五者於惡臭苦來求香華及諸鬘塗即便施以香華鬘塗六者於缺止憩及光明苦來求止憩施止憩處其勤修者來求燈明施以燈明七者於求依止為作饒益此復有二一者攝受徒衆意樂非求名聞利養恭敬以憐愍心現作饒益以無染心先與依止二者攝受徒衆加行此復有二一者財攝二者法攝初復有二一者從他求索而施與之為攝受徒衆故應從淨信長者居士求索衣服飲食臥具病緣醫藥資身什物而給施之二者以自資具與他共用於己以法所獲如法衣服等物與衆同用言法攝者亦復有二一者施以教授此復有八當知略由三處所攝一未住心者有五教授令於所緣能繫念故謂於貪瞋癡慢疑如其所應為其宣說不淨慈悲緣起修界差別修阿那波那念而教授之二心已住有一教授為令獲得自義利故為其宣說能治斷常二邊邪執處中之行三於自所作未究竟者有二教授令捨中間所有留難謂令捨除於所行道未作謂作於所趣果未證謂證諸增上慢當知如是三處能攝八種教授二者施以教誡復有五種一者遮止有罪現行二者開許無罪現行三者若有於所遮止法中暫行犯者如法諫誨四者若有於彼法中數數輕慢毀犯不捨如法調伏五者若有於所開遮法中能正行者讚歎歡喜八者隨有情心為作饒益此復有二一者略詮謂諸菩薩隨有情心義利轉時先應了知一切有情若心若體若性既了知已隨諸有情所應共住即應如是與其共住隨諸有情所應同行即應如是與其同行所言心者謂是善惡瞋慈等心所言性者謂是信樂當審觀彼所信樂乘隨之而轉所言體者謂是隨眠二者廣說謂諸菩薩隨心轉時當勤注念諸損益事若諸菩薩欲隨所化有情心轉當審觀察現行身語令他有情生諸憂苦如是憂苦若不令其出不善處安立善處菩薩爾時護彼心故方便思擇勵力遮止令不現行如是憂苦若能令其出不善處安立善處菩薩爾時不隨如是有情心轉住哀愍心勵力策發要令現行令彼究竟得利益故如是現行而得令諸隨轉有情於諸憂苦不復生起若餘有情起憂苦者如是菩薩行捨方便如前應知若諸菩薩如是現行非是隨他有情而轉謂由自事現行身語生他憂苦如是現行若非菩薩學處所攝或非福智二種資糧或復不能令他有情出不善處安立善處爾時菩薩護他心故即應遮止令不現行若復有違於上三者菩薩即應住哀愍心勵力策發要令現行不隨如是有情心轉若於如是現行身語令他有情現生喜樂若彼究竟當有義利要令現行若彼究竟不獲義利即應遮止令不現行如前應知又隨他心而轉菩薩知他有情忿纏所纏現前忿纏難可捨離尚不讚嘆何況毀呰即於爾時亦不諫誨又隨他心而轉菩薩見他愚癡昧世道理他雖不來談論慶慰尚應自往談論慶慰何況彼來而不酬報又隨他心而轉菩薩訶責他時終不故意惱觸於他起慈悲心諸根寂靜如應訶責又隨他心而轉菩薩於大衆中終不嗤誚輕弄於他令其赧愧恐他生起輕蔑因故亦不令其心生憂惱恐他不能安穩住故雖能摧伏得勝於彼而不彰其墮在負處恐他生起羞恥心故彼雖淨信生於謙下終不現相而起自高恐他生起怯劣心故又隨他心而轉菩薩於諸有情非不親近非密友故於諸有情不極親近恐常伴他間斷他業令他厭故於諸有情亦不非時而作親近謂當以時而親近故如是三事餘疏未釋又隨他心而轉菩薩終不現前毀他所愛亦不現前讚他非愛他不樂故非情交者不吐實誠心不和合故於他惠施不屢希望知量而受恐他生起厭離嗤誚忿怒不敬不復信施及還索想故若許飲食終無推托恐復捨逆他意樂故為性謙冲如法推謝當以讀誦靜慮持戒婉言謝辭令他有情皆歡喜故九者於正行者為作饒益謂於信戒聞捨慧等功德具足者前稱揚讚歎謂稱讚於戒捨行者當得身資圓滿是顯高因於慧行者是解脫因由聞功德生起智慧由信功德生彼二因十者於倒行者為作饒益謂他有情有下中上三品過犯無損惱心無瞋恚心如其所應以軟中上三品訶責而訶責之如訶責法治罰亦爾若諸有情有下中品過失違犯菩薩爾時為教誡彼及餘有情以憐愍心權時驅擯一月二月乃至數年後還攝受若諸有情有上品過菩薩爾時為愍彼故勿令其人多攝非福又為教誡利餘有情盡壽驅擯不與共住不同受用不還攝受言非福者謂不如理受用信施或慢然受同梵行者禮拜等事言過失者於應理行而亦不行言違犯者於不應行而竟現行如德光論師所說十一者為欲饒益諸有情故以神通力而作調伏此復有二一者以神通力而恐怖之示現寒熱諸那落迦令彼見之而告之言汝於人中先時造作積集惡行今受如是非愛苦果令生厭患離諸惡作復有一類無信有情菩薩衆中隨事故問彼作異思拒而不答菩薩爾時或便變化執金剛神或復化作壯色大身巨力藥叉令其恐怖由是因緣生起敬信正答所問其餘大衆聞彼答故亦皆調伏最勝子云此謂彼欲在大衆中損惱菩薩故作異思拒而不答為令正答於所問故菩薩爾時現神通力令其恐怖而作正答二者以神通力而引攝之或一變多或多變一或以其身穿過石壁山巖等障往還無礙乃至梵世身自在轉上身出火下身出水現無量種神變差別或復現入火界定等方便引攝令諸有情踴躍歡喜於未信者於犯戒者於少聞者於慳吝者於惡慧者如其所應令彼安處信戒聞捨慧具足中如是饒益有情戒十一種相自餘疏中亦有別說惟戒二十頌釋難乃如前說謂攝集事業疾病苦惱三種助伴為一種相最契本論最勝子云如是為令增長自福德故名善法戒為令引發利他意樂即成饒益有情戒此說即或不能真實利他心緣他利亦得說名饒益有情戒然本論中唯說真實利他饒益有情戒倘或未能真實利他不得說名具足饒益有情戒雖不具足然亦無過譬如散亂或睡眠時雖或未實有遮護之心然律儀戒亦不捨失發菩提心儀軌云初發心者以律儀戒為根本故是名願行住解行者以攝善法戒為根本故名靜慮行入大地者以饒益有情戒為根本故名歡喜行如是雖有先後三種根本戒行然受戒時即應勤修饒益有情惟未具足神通力者未能真實廣作饒益是故上師無著分別饒益諸有情境宣說饒益有情戒相明顯切要當善了知應依彼彼而作饒益是名菩薩成就一切種饒益有情戒四者圓集要義此如菩薩地中所說菩薩所有三種戒藏謂律儀戒攝善法戒饒益有情戒所攝戒藏攝受無量淨戒學處亦名無量大功德藏攝決擇分菩薩地中即以此律儀等三戒攝為三種毗奈耶聚初律儀戒應如別解脫及其廣釋所說而修學之攝善法戒應於六心觀察勤習如攝決擇分云當知菩薩毗奈耶略有三聚初律儀戒毗奈耶聚如薄伽梵為諸聲聞所化有情略說毗奈耶相當知即此毗奈耶聚云何攝善法戒毗奈耶聚謂諸菩薩於攝善法戒勤修習時略於六心應善觀察何等為六一輕懱心二懈怠俱行心三有覆蔽心四勤勞倦心五病隨行心六障隨行心若諸菩薩於善法中所有輕心無勝解心及陵懱心名輕懱心若有懶惰憍醉放逸所纏繞心名懈怠俱行心若貪欲等隨有一蓋或諸煩惱及煩惱所纏繞心名有覆蔽心若住勇猛增上精進身疲心倦映蔽其心名勤勞倦心若有諸病損惱其心無有力能不堪修行名病隨行心若有喜樂談論等障隨逐其心名障隨行心如是生起彼六種心或復忍受或不忍受為是有罪抑是無罪彼論又云菩薩於此六種心中應正觀察我於如是六種心中為有隨一現前行耶為無有耶於前三心菩薩一向不應生起設已生起不應忍受若有忍受而不棄捨遍於一切皆名有罪勤勞倦心現在前時由此心故捨善方便若為暫息身心疲惱當於善法多修習者當知無罪若於一切畢竟捨離謂我何用精勤修習如是善法令我現在安住此苦若如是者當知有罪病隨行心現在前時菩薩於此無有自在不隨所欲修善加行雖復忍受而無有罪障隨行心現在前時若不隨欲墮在其中或觀此中有大義利雖復忍受而無有罪若隨所欲故入其中或觀是中無有義利或少義利而故忍受當知有罪如是六心前三生已而忍受者一向有罪病隨行心雖復忍受一向無罪餘之二心若生起已而忍受者或是有罪或是無罪於行饒益有情戒中當觀六處攝決擇分云若諸菩薩於作有情利益戒中勤修習時當正觀察六處攝行所謂自他財衰財盛法衰法盛是名六處言財衰者謂衣食等未得不得得已斷壞與此相違當知財盛言法衰者謂越所學於先未聞勝義所攝如來所說微妙法句不得聽聞如不聽聞先所未聞如是於先所未思惟不得思惟有聽聞障有思惟障設得聞思尋復忘失於所未證修所成善而未能證設證還退與此相違當知法盛此中自他即是財法盛衰所依復觀六處進退之相或是有罪或是無罪如論又云此中菩薩作自法衰令他財盛此不應為如令財盛法盛亦爾此中義者越學所攝及能隨順越學所攝或於證法退失所攝當知法衰又諸菩薩作自財衰令他財盛若此財盛不引法衰此則應為若引法衰此不應為如令財盛法盛亦爾又諸菩薩作自財盛令他財盛此則應為如令財盛法盛亦爾又諸菩薩作自法盛令他財盛此則應為如令財盛法盛亦爾於如是事若不修行名為有罪若正修行是名無罪如是且說菩薩所受三種律儀略毗奈耶菩薩於中常應作意思惟修學如是於他補特伽羅欲行法利或財利者若自毀失所受學處或未毀失而將毀失若失已得或新得法由是大作利他事者即得無罪如是利他令自財衰不引法衰若不為者是名有罪若引法衰則不應為如是能令自財法盛而不令他成就此二是名有罪又行利他或是有罪或無罪者如攝決擇分云若諸菩薩於己有恩諸有情所隨順恩想相續發起親友意樂以有染心方便攝受欲為朋黨當知有罪或於有怨諸有情所隨順怨想相續發起怨讎意樂有穢濁心當知有罪或於無恩無怨諸有情所相續發起中庸意樂放捨意樂當知有罪若有現前求欲出家隨順觀察時有過患劫有過患不度出家當知無罪若有安住憐愍彼心雖度出家亦無有罪如說出家受具足戒與作依止攝為徒衆當知亦爾由如是等所有行相當知菩薩三種戒蘊皆得圓滿如是正受諸律儀已於三種戒悉當愛護然於根本處律儀戒共諸七衆別解脫戒更應勤學攝決擇分又云此三種戒由律儀戒之所攝持令其和合若能於此精勤守護亦能精勤守護餘二若有於此不能守護亦於餘二不能守護是故若有毀律儀戒名毀一切菩薩律儀問然則正受菩薩戒已於三戒中應持其一抑并持三答菩薩戒者唯是一類非如別解脫有多種戒若受持者於所受學非可簡別應圓滿持攝決擇分云若有於此三種所受菩薩戒中隨有所闕當知非護當言不護菩薩律儀不當言護問若爾則如學集論云故當隨自堪能於一善道亦應正受而守護之聖地藏經云如是十善業道能致正覺若復有人乃至盡壽不能守護一善業道而自稱言我是真實大乘行者我求阿耨多羅三藐三菩提者當知是人是極虛詐說大妄語對十方界佛世尊前誑惑世間作斷滅語是愚癡人身壞命終墮諸惡趣以是言之能須臾時集諸善品亦名安住善道此義又見藥師琉璃光王經說如是於學護其一分此得說名菩薩戒不答此非謂是學菩薩戒之所應爾此謂由彼發願心者不能受持菩薩戒故為令彼等漸次修習隨所堪能令於學處習其少分或須臾時護彼所學故於菩薩戒隨自力能所集而受若不受者則是欺誑諸佛菩薩諸天世人論中為顯如是等過申引前經更復說云若大心有情聞說是已以慧觀察知菩薩行最為難行意樂勇猛荷負重擔救護衆生盡諸苦本此謂由聞不護所受學處等過知菩薩行最為難行能於學處擔荷不怯乃堪受持菩薩淨戒若由習聞前過失故知菩薩行最為難行而於學處不能悉荷應當發願於菩薩行次第修學若心力廣於菩薩戒當圓滿持當知此是藥師經真實義如是等義熟閲彼經可知二受戒法此復有二一者通義二者本義初通義者龍樹菩薩雖僅造有發心儀軌未別造有受戒儀軌然於發心儀軌中云我發最勝菩提心廣攝一切諸有情樂行最勝菩提行為利有情願成佛如是三誦發菩提心又云我今當以布施持戒忍辱精進等持禪定觀解智慧善巧方便隨以一種皆為利樂一切有情求得無上正等菩提隨諸過去未來現在具大悲心住大乘道已入大地諸勝菩薩而勤修行願諸聖者我今當作菩提薩埵仰祈證許我作菩薩又學集論及入菩薩行論謂如是誓願學菩薩行隨順一切菩薩之行所云發心即謂受戒本論亦謂三世一切菩薩誓學三戒即謂受學菩薩淨戒菩提賢師無畏生師融合龍樹無著二大轍義而造受戒儀軌道炬論疏亦謂尊者阿底峽所造發心受戒儀軌係據龍樹無著寂天等義而說蓋以龍樹無著二種儀軌雖少有別而得戒法義無差異若由如是二種理趣便謂授者受戒儀軌及根本罪所立理趣有中觀唯識之別是為極不思擇之說聖者無著菩薩雖言受戒菩薩應起願心然於戒儀軌外并未著有發心儀軌慈氏所造與世親論中亦無其說勝怨論師造有願行受戒二種次第阿底峽亦分造發心儀軌與戒儀軌黑行所著大乘寶要義論疏及入菩薩行論疏中亦分立有願行儀軌若謂行儀軌不同於戒儀軌者不應道理應以發願儀軌為先願堅固已次方授以戒儀軌法是名往昔諸善知識善能堅固淨戒方便問若爾廣釋菩提心論云世俗菩提心者起悲愍心誓願現在救度一切有情故願當成佛廣利有情是名趣求阿耨多羅三藐三菩提最初發心之相如是亦如戒品所說軌法應從善巧住戒菩薩前發此義云何答誓願修學三世菩薩一切學處於如是事自誓發心此是具發願心行心軌法非是唯說發願心軌二者本義此復有二一有師法二無師法初復有三一者加行二者正行三者終行初復有五一者請白二者備具資種三者請速授戒四者起勝歡喜五者作次第問請白有二初辨補特伽羅次辨受法初辨補特伽羅又復有二一辨受者云何受者得受淨戒謂諸菩薩或是在家或是出家欲如前說菩薩所學三種戒藏以勝意樂勤修學者先於無上正等菩提發弘誓願謂如上師之所教授而發願心若有唯欲受菩薩戒於菩薩學不樂修學或樂修學不起願心則不應授與菩薩戒又為求受淨戒菩薩作依止故於授菩薩菩薩戒前先應為說菩薩法藏摩怛履迦菩薩地中菩薩學處及犯處相令其聽受如所說言令自觀察能受與否應以慧觀自所意樂堪能思擇受菩薩戒非自不欲為他所勸亦非勝他當知是名堅固菩薩堪受菩薩淨戒律儀以受戒法如應正授如是與毗奈耶有別此於未受淨戒以前令善聽聞正知解了令於所學能善防護其心堅固乃與授戒若能成就彼彼意樂能生淨戒若未成就不能生起如攝決擇分云若有為令他了知故隨順他故由他勸導受菩薩戒非自所起增上意樂隨觀隨察自生淨信於諸有情住憐愍心愛樂善法受菩薩戒當言此非真實防護亦非圓滿修習善法亦不能得彼果勝利與此相違當知乃名真實防護亦名圓滿修習善法亦能獲得彼果勝利二辨授者何等授者可從受戒當審訪求已發大願同法菩薩謂已發願住戒菩薩於大乘道具有智力於受戒時啓白語表能持其文開解其義如是授者可從受戒何等授者不可從受謂諸菩薩不從一切唯聰慧者求受菩薩所受淨戒謂恐致有意樂損害加行損害故所言意樂損害者謂無淨信於所受戒初無信解是為上品意樂損害不能契入是為中品意樂損害不善思惟或不精進是為下品意樂損害所言加行損害者謂能損害六度加行一者愛著身財而起慳貪增上力故名慳貪蔽於所未得而有大欲於已獲得亦無喜足取上諸事名障布施二者由犯他勝處故名毀淨戒現行惡行復犯餘戒於諸學處無有恭敬於戒律儀復有緩慢三者若值違逆因緣不能忍受起惱觸心而生忿怒於他損害數數惱觸而起怨恨於他違犯沙門四法所起四過不復堪耐四者不樂善法而起懶惰隨順惡業而生懈怠所謂多分耽著日夜睡樂倚樂臥樂好合徒侶虛度時日樂喜空談五者心不善住奢摩他等而起散亂乃至不能牛乳頃善心一緣安住修習六者惡慧此復有二一者現行惡慧謂不自了知其性暗昧雖復開示猶不領解是愚癡類於廣大處自生怯劣不能忍受或性愚昧有極劣心二者惡慧起因謂誹謗菩薩素怛纜藏摩怛履迦謂其有誤如是等類不可從受菩薩淨戒有疏說言上來諸過多分具者不可從受非謂不從具少過者以是言之若不具有重大過患而僅有具有少分過者亦得從受次辨受法此復有二一辨受者法如前所說受戒菩薩先向授者雙足頂禮由不恭敬不能生起菩薩戒故又如勝怨無畏生並云於此應先貢獻曼達次請白言我今欲於善男子所乞受一切菩薩淨戒唯願須臾不辭勞倦哀愍聽受若不求受戒不生故又勝怨菩提賢阿底峽無畏生皆云應當如是三返請白又無畏生勝怨云爾時合掌蹲跪而坐或右膝著地又如後文所說威儀隨取皆得二辨授者法復次能授菩薩於彼求受淨戒菩薩當為宣說菩薩淨戒廣大勝利又為求受淨戒菩薩宣說學處輕重諸罪令生意樂作如是言善男子聽汝今願樂於諸有情未得度者令其得度未解脫者令其解脫未蘇息者令其蘇息未涅槃者令般涅槃紹隆佛種令不斷否汝當於此發堅固心又當於此立堅固願此由見彼求受戒者不如實知求受戒類令於受戒生起意樂荷持所學願樂堅固故作是說護戒勝利當說如後又如學集論言寂靜決定神變經云復次曼殊室利若菩薩於殑伽沙數諸佛一一佛所以充滿殑伽沙數佛剎大自在摩尼寶王而作供養如是復經殑伽沙數諸劫恆常供養曼殊室利若餘菩薩聽聞如是等法相已退自思維我當修學於是正法由彼如是樂修學故縱未修學獲福甚多超過如前菩薩所有以大自在摩尼寶王供養福德如是菩薩見是功德不應退轉此經又云曼殊室利假使三千大千世界極微塵數一切有情一一有情皆作閻浮提王是諸王等並作是言若有受持讀誦如說解行大乘經者我等日日當以爪甲割彼菩薩五兩身肉以如是苦令其捨命曼殊室利若此菩薩雖聞是語不驚不懼亦不恐畏乃至不起一念惶怖不怯不縮亦不遲疑持受正法轉更精進曼殊室利如是持誦解行菩薩心勇猛故布施勇猛持戒勇猛忍辱勇猛精進勇猛禪定勇猛智慧勇猛一切三摩地勇猛曼殊室利菩薩於彼來加害者亦復不生忿心厭心及嗔恚心曼殊室利如是菩薩如釋梵王等無所動若於今時敬持所學便能獲得殊勝果報月燈三昧經云若於恆河沙數劫千億那由他佛前至心供養諸幡蓋亦供燈鬘及飲食若於正法衰末世如來聖教欲滅時於一日夜持所學比前福報尤殊勝是故應當敬持所學如是能授淨戒菩薩應當於彼能受菩薩如論所言廣為宣說所言學處輕重諸罪謂當廣為宣說根本諸罪謂之重罪餘諸違犯謂之輕罪不護學處所有過患如學集論所言正法念處經云若於先時少起施念後不施者墮餓鬼趣先已許施後不施者墮那落迦何況許施無餘有情無上菩提而不修習法集經云善男子菩薩應善修習實諦何以故善男子言實諦者即謂正法善男子云何名實諦若菩薩發阿耨多羅三藐三菩提心乃至棄捨身命不捨是心不捨諸衆生故是名菩薩實諦若菩薩發阿耨多羅三藐三菩提心已復於後時棄捨是心及捨諸衆生者是菩薩為大妄語實可呵厭聖海意經云海意譬如世間若王若臣普召國中一切人民欲餉美膳悉令飽滿而不備辦所須飲食虛誑國中一切人民是諸人等既誤所食各於異處求以食之心懷恚恨呵責而出海意菩薩亦復如是願為一切有情未度者令度未解脫者令得解脫未安穩者令得安隱未涅槃者令般涅槃而彼菩薩雖有是願而不勤修多聞亦不積集諸善菩提分法是名不能如說而行彼菩薩者則為虛誑諸天世人往昔親近如來諸天見其如是呵毀厭棄若先許施後還實行如是施主甚為希有海意是故當知菩薩不應但以語言虛誑一切天人世間謂於學處先所願持後不防護如是過患當墮惡趣作大誑語欺謊諸佛菩薩世人亦為諸天之所呵責由見如是所有勝利及過患故乃能不捨於所發心誓願堅固受持淨戒此在阿底峽所造論中未說淨戒勝利與輕重罪唯於善男子聽至又當於此立堅固願文後復加問言非為勝他耶非為他勸耶又昔諸師於前四問後復各加問言汝願樂否汝今欲受菩薩淨戒非為勝他否非自意樂唯他勸否於諸菩薩素怛纜藏摩怛履迦已聽聞否解否信否能少持否於如是問即應答言唯然少聞如是一一如儀而答所言未度令度等如有賢論師云聲聞緣覺於所知障未斷除者令其斷除釋梵諸天癡等二惑未解脫者令其解脫那落迦趣諸有苦苦未出離者令其出離諸有情類未能得般無住涅槃令般涅槃二者備具資糧謂別解脫戒唯於僧衆恭敬承事便得受學別解脫戒此菩薩戒最殊勝故應先向於諸佛菩薩廣作供養次乃得受菩薩淨戒是故求受淨戒菩薩應袒右肩對佛像前如是祈請十方三世諸佛世尊已入大地得大智慧具大神力諸菩薩衆為作供處現前專念如是淨戒所具功德此諸功德不共聲聞如是淨戒第一最上善心意樂之所發起隨其現在精進之力及宿因力生殷淨心或復由是因緣之力生少淨心恭敬供養要應先事淨除壇地而善莊嚴中設佛像於旁安設諸菩薩像即自觀想十方諸佛菩薩如現在前專念彼彼所有功德啓極信心又復迎請上師坐獅子座如儀軌說作如來想廣陳上妙香花燈塗衆多供具先於三寶及上師前分別禮讚供獻曼達上師復以勝善方便導諸弟子而作供養三者請速授戒次當俯伏右膝著地或蹲跪坐作如是請唯願哀愍授我菩薩淨戒律儀於彼上師若是在家稱善男子年輕有德即稱大德年高有德即稱長老阿底峽謂應更請云唯願速授如是三請德光則云既說有善男子等三種則不必定從出家者求受淨戒亦非唯從年高長者求受淨戒吉祥智云顯密二乘道苾芻求受戒從智比丘受不應從餘受謂苾芻求受二種勝戒應從有苾芻所求受而不應從在家等受然亦非謂從餘者受即不生起菩薩淨戒四者起勝歡喜謂當專念一境長養淨心自念我今不久當得無盡無量無上大功德藏即隨思維如是義事恭敬合掌默然而住五者作次第問爾時有智有力菩薩以無亂心若坐若立向受戒者而作是言汝如是名善男子聽或法弟聽汝是菩薩不彼應答言是發菩提願未應答言已發作此二問義謂令彼證知堪作菩薩種姓復堅固彼所發願心上師阿底峽謂先次第問後起歡喜續更問言欲於我所受諸菩薩一切學處受諸菩薩一切戒否受者亦應答言願受如是答已乃與授戒二者正行軌法先應開示軌法文義而作是言汝如是名善男子聽如是學處如是淨戒過去一切菩薩已具如是學處如是淨戒未來一切菩薩當具如是學處如是淨戒普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學如是菩薩一切學處一切淨戒謂律儀戒攝善法戒饒益有情戒汝能受不答言能受如是三問三答能受言學處者謂諸菩薩所修學處言淨戒者謂是菩薩學處自性上來開示三世菩薩所共學處及學處相總說名為三聚淨戒如是菩薩應當正受三者終行軌法此復有四一者啓白請證能授菩薩對佛像前普於十方現住諸佛及諸菩薩恭敬供養頂禮雙足合掌白言某名菩薩今已於我某菩薩所乃至三說受菩薩戒我某菩薩已為某名菩薩作證唯願十方無邊無際諸世界中諸佛菩薩第一真聖於現不現一切時處一切有情皆現覺者於此某名受戒菩薩亦為作證第二第三亦作是說又令弟子如儀而坐應作是念我今頂禮十方佛菩薩足便向十方各三頂禮散花供養起立合掌先請十方現住諸佛菩薩護念於我次請作證若當頂禮上下方者即應心緣彼上下方東西作禮言不現者謂是我等所言現者謂是一切諸佛菩薩二者讚彼勝利如是受戒羯磨畢竟從此無間普於十方無邊無際諸世界中現住諸佛已入大地諸菩薩前法爾相現即於座處起震動相由此表示如是菩薩已受菩薩所受淨戒爾時十方諸佛菩薩復於如是受戒時處能受菩薩生起憶念由憶念故正智見轉由正智見如實覺知某世界中某名菩薩於某菩薩所正受菩薩所受淨戒視此一切受戒菩薩如子如弟生親善意眷念憐憫由佛菩薩眷念憐愍令是菩薩希求善法於諸學處無有間斷倍復增長無有退減而得成就如是菩薩所受菩薩淨戒律儀於餘一切淨戒律儀有四殊勝何等為四一者無上最勝無比故二者無量無邊大功德藏之所隨逐堪能攝受無量大功德果故三者第一最上善心意樂之所發起利樂一切有情能起增上意樂故四者普能對治一切有情三門所造諸惡行故受別解脫淨戒律儀於此菩薩淨戒律儀所有功德百分不及一千分不及一數分不及一算分不及一計分不及一喻分不及一塢波尼殺曇分亦不及一三者酬恩供養爾時能授能受菩薩普向十方無邊無際諸世界中諸佛菩薩如前供養頂禮雙足恭敬而退四者不率宣示菩薩淨戒謂諸菩薩於受菩薩戒律儀法軌則文句雖已具足受持究竟而於憎背菩薩藏者無信有情終不率爾不擇於他是器非器宣示文句令彼了知所以者何為其聞已不能信解大無知障之所覆蔽便生誹謗言菩薩藏不善無義不應於理此如安住菩薩淨戒得成無量大功德藏彼誹謗者口出惡言意著惡見現行邪想諸惡思惟乃至一切未永棄捨即為無量大罪業藏之所隨逐如是終行軌法阿底峽師攝為四類在本論中亦有此義又阿底峽謂啓白請證已次乃酬恩供養本論所示亦復如之今此為方便故酬恩供養列於後菩薩戒二十頌攝其義云至心恭敬而禮供一切如來與菩薩所有十方三世中一切菩薩所住戒廣大無量福德藏以此勝妙之意樂從彼具有勝智力具戒上師而受之爾時一切佛菩薩以彼受者所修善恆時生起親善意護念眷愍如愛子謂初二語示加行軌法次六語中說所受戒能受意樂能授上師後四語中讚彼勝利示終行軌法二無師法若不會遇如前所說具足功德補特伽羅爾時應對如來像前自受菩薩淨戒律儀偏袒右肩右膝著地或蹲跪坐作如是言我如是名仰啓十方一切如來已入大地諸菩薩衆我今欲於十方世界佛菩薩所誓受一切菩薩淨戒謂律儀戒攝善法戒饒益有情戒於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學如是三說說已應起所餘一切如前應知謂所餘軌法悉皆同於有上師法諸餘疏中雖未明說所餘一切應行捨處然於作次第問啓白請證不率宣示諸則似可捨置言有師無師者又如大乘寶要義論疏云若有生命淨行之礙雖近於師與無師等若無生命淨行等礙雖所在遠亦應訪求又新疏云於先所受還出還淨及不淨信而受戒者皆不應依無師法受應依有上師法而受言不敬信而受戒者謂雖有師而不敬信乃欲自受菩薩淨戒即不應理言於先所受還出還淨者如舊疏謂若有師者當依有師軌法而受若無師者即得依無師法而受此義出自菩薩地中無師之法即是無著菩薩密意謂於所受還出還淨應如論中若不會遇具足功德補特伽羅中所說故慨自今時正法衰微於大小乘所受諸戒各能修學而愛護者有若晨星授戒之人所具功過功德勝者已屬希有況云具足經論所說一切性相若別解脫及密乘戒於初受時應依軌法設或無師即無軌法可受至若欲受菩薩戒時先未能得性相具足補特伽羅得自向於如來像前依諸清淨軌法而受即得生起圓滿性相謂初受時菩薩戒法與前二異由是一切具慧菩薩應於此戒清淨而受以勝意樂而正護之是故能受補特伽羅隨自功能應勤修學寂天菩薩云我今於此生善獲人身果現身如來種得住菩薩位謂受戒者應如是念今受是戒則此生中有大義利所獲人身即不虛獲堪能入住菩薩衆中寂天菩薩又云我今必須作隨順菩薩行於是尊貴種不令有污垢又受戒者應如是念從今以往我所修習不令於戒有所染垢上來已釋受戒法竟三防護戒此復有二初總說防護戒次分別說防護戒初總說者謂此菩薩安住所受菩薩淨戒當善審知取捨諸相孰是菩薩正所應作孰非菩薩正所應作既審知已然後為成正所作業當勤修學又應專勵聽聞菩薩素怛纜藏及以解釋隨其所聞當勤修學學集論云菩薩淨律儀方廣大乘說又云不捨善知識恆見聞經典謂應依於如是方便於菩薩戒而善防護復應不捨彼善知識及善修習菩薩學者此是護戒殊勝方便又當廣於大集等經更於菩薩地學集論善為聽受若於戒品不善聽受即是昧於菩薩學處妄稱大乘欺誑世人為諸受持大乘經典善能尋求勝慧解者之所棄厭若於彼彼既聽聞已應當精勤修學所學莫如貧人數他財寶法句經云雖能巧言說放逸不行故如牧數他畜不堪作勤策雖不巧言說如法修行故遠離貪瞋癡堪能作勤策又入菩薩行論云口誦身不行當知何所喻譬如重病人空談於藥力問若爾初行住大乘者於素怛纜藏中所說學處幾當修習答初行住大乘者於諸如來正遮止處不應修習或未遮止而初學時不宜作者亦復不應頓時修習舍此二外於餘一切菩薩學處若不修習當知有犯此如學集論云凡諸菩薩於諸如來所正遮處或復不應頓時作者不應修學如是初行住大乘者不應於此二中修學捨此二外自餘一切即應修學又除捨二不應學外於諸學處無力受持而不學者亦復無罪亦如學集論云為欲成就一學處故於他學處雖不防護亦無有罪譬如欲行廣大布施戒可舒緩於所行施不應弛緩此如無盡意經中說又如十地經云非謂於餘不應修學當隨力能如應修習若於學處正修學時或當有罪或當無罪一者謂欲令彼一切有情身心生諸安樂離諸憂苦而乃不以無諂至心三業精進而輕捨者是名有罪如是縱於一剎那間生輕捨心亦名有罪若諸菩薩當勤修時而不積集助品資糧復不勵力對治逆品輕捨如前亦名有罪如欲對治廣大憂苦而不忍受微細憂苦或欲成就多分義利亦不捨去少分義利如是等事於一剎那生輕捨者亦名有罪若自無力不能修學於諸學處非制處故非是菩薩正應行故若不修學即無有罪若強行者亦名有罪如是之罪得於通常行懺悔時悔除不須別悔亦得還淨若諸學處是所能學而不精勤亦名有犯如是之罪可名性罪謂與知而故犯同分二者云何說名有罪此復有二一不專諦思維而犯謂不隨力專諦思維應理與否便爾進行或復逆止或復放捨當知有罪二雖思惟於所應作不作而犯謂雖諦思進行逆止乃至放捨如理與否於所應行而亦不行亦名有罪若行如是顛倒之行乃至有犯旃陀羅奴所譏毀事亦名有罪如學集論初品所說凡諸菩薩正所應作非所應作略如菩薩戒二十頌云於自或於他有情有樂有利正應作苦而有利亦應作樂而無利非應作所言利者謂令自他無諸染污亦無罪垢於當來時受樂異熟所言樂者謂受用樂若自若他現前受樂於當來時有利益者即所應作若自若他現前受苦於當來時無義利者即非應作若現受苦於當來時有利益者亦所應作譬如賢士呵諸惡作及劣行者阻彼現行現前似苦當來有利有如良藥味雖不甘暫似苦覺而利於病又如邪淫現似有樂於未來時增長多苦又如毒飯雖似甘旨由毒壞故亦應阻奪如是諸義廣如菩薩地利益種類自利利他安樂種類自利利他中說二分別說防護戒此中有六一者應捨諸罪二者護彼心相三者犯已還淨方便四者說貪是輕罪密義五者分別下中上品諸罪六者住安樂因初言應捨諸罪何等菩薩生起諸罪所言罪者當有幾種謂如論云又一切處無違犯者謂若彼心增上狂亂若重苦受之所逼切若未曾受淨戒律儀當知一切皆無違犯謂諸菩薩應住二法一者不捨所受淨戒二於淨戒意樂正住所言罪者當有二種戒二十頌舊疏云菩薩戒中總有二罪一者他勝處法所攝二者違犯法所攝非若苾芻戒中有五種罪新疏及牟尼護念莊嚴論亦說唯有此二罪品至本論中義亦復爾藏土有師並黑阿闍黎難釋有云菩薩戒中應防護者有其三種一他勝罪二者粗罪三違犯罪不應道理如其所說是以軟中品纏犯他勝法列為粗罪實與論本所說相違由論本中僅說他勝法與違犯法故復次軟中品纏犯他勝罪性是違犯品屬他勝謂若有犯他勝處法隨是粗罪或違犯罪皆應攝於他勝罪故應捨諸罪有二一他勝罪聚二違犯罪聚初復有五一者他勝自性二者他勝所作三者三種纏犯分別四者堪能還淨殊特五者捨戒因緣他勝自性所說有二一如本論所說二如餘論所說初如本論所說謂如菩薩住戒律儀有其四種他勝處法此中他勝復有二支一通二別通支如後三種纏犯分別中說別支有四一者為欲貪求利養恭敬自讚毀他是名第一他勝處法此中有三一所說境二所說語三云何發起言說初所說境謂此他勝所依之境是己同分非為自身彼善言說復能解義與己同類論本於此雖無其文實有其義二所說語說自功德言他過失於自讚許於他有德可恭敬處便生譏毀三云何發起言說此復有四一者所貪利養恭敬二者貪求意樂三者利養恭敬分別四者審思所發言說是否由貪利養恭敬二事初言所貪利養恭敬謂是衣食住乘所有利養設座獻床所有敬事二言貪求意樂謂所貪求利養恭敬非為供養三寶哀愍下劣濟諸貧乏而希求故謂由自性愛欲增上貪著而乃希求利養恭敬故三言利養恭敬差別所求利養當知非是自有財物若非為貪他利養者彼即不事自讚毀他所求恭敬謂令徒衆於自敬信以諸財物與衆同用四言審思所發言說是否兼貪利養恭敬二事謂於利養恭敬有一貪求即便發起自讚毀他非必兼貪利養恭敬二事而起讚毀故如是發起自讚毀他凡所言說為他所覺即等第一他勝處法菩薩戒二十頌新疏云他者謂是有功德人為他有情所恭敬處薩穆札疏所說亦同亦謂他是有功德者虛空藏經謂有二相如後當說所云貪求利養恭敬者如新疏云謂貪求諸衣食利養及諸上好供事恭敬如是生起增上戀著薩穆札疏亦云利養謂諸衣食財寶恭敬謂是尊敬承事及獻座等二者若諸菩薩現有資財性慳財故有苦有貧無依無怙正求財者來現在前不起哀憐而修惠捨正求法者來現在前性慳法故雖現有法而不給施是名第二他勝處法此中有四一來求者二所求物三求財法處四不惠施者所起意樂一來求者有疏云是苦無財者貧無食者如失家主無所怙者無友資助無所依者所有二種受用貧乏舍諸菩薩莫為開解由是彼等至心來求正現在前薩穆札疏云此是求者現前來住二所求物非若武器及諸毒等非宜之物非可用物有諸損害三求財法處如新疏云能施之人有財有法是名現有四不惠施者所起意樂謂慳貪所蔽定不施與如論所云不起哀憐故不修財施性慳法故不作法施新疏薩穆札疏中並謂法財二者悉由性慳而不施與戒二十頌亦宗此說藏土有師云不惟自慳定不施與且使求者絶所希望然考印土論中皆無是說義亦不合三者若諸菩薩長養如是種類忿纏由是因緣不唯發起粗言便息由忿蔽故加以手足塊石刀杖捶打傷害損惱有情內懷猛利忿恨意樂有所違犯他來諫謝不受不忍不捨怨結是名第三他勝處法此中有二一者捶打二者不受諫謝初捶打者復有二種初言意樂謂若菩薩於諸有情由忿怒故即便發起粗言便息不捨怨結更復增長為忿所蔽次言加行由忿蔽故於他有情便以手足或以塊石而捶打之或以武器而傷害之或復施以杖擊執縛而損惱之何等有情為所損害此在論中雖未明說應知當是與己同類有覺知者何謂粗言謂語表意令彼覺知何謂捶打詳如學集論中犯根本罪所說二者不受諫謝此復有四一來諫謝者二諫謝之相三發起忿怒四不受諫謝初來諫謝者謂如新疏最勝子疏並云作損惱者今來悔謝彼損惱罪謂他有情先於菩薩作諸損惱今以至心欲來諫謝二諫謝之相謂能應時如法來前祈請忍受三發起忿怒謂於前損惱內懷猛利忿恨意樂四不受諫謝謂不忍不受不聽所言不捨怨結四者若諸菩薩謗菩薩藏愛樂宣說開示建立像似正法於像似法或自信解或隨他轉是名第四他勝處法此中有二一者背捨大乘二者說像似法背捨大乘又復有二一背捨處即毀謗處謂是毀謗佛說一切菩薩甚深廣大二種法藏二背捨相如下所說毀謗之相二者說像似法亦復有二一所說法諸疏於此皆未明說唯薩穆札疏謂偏缺法然如論云像似正法或外道法尚非像似大乘之法當是一切非清淨法二所說相以自愛樂為他宣說如我所見令他隨轉綜集是義如菩薩戒二十頌云謂若猛利煩惱生即能毀壞一切戒當知其罪有四種佛密意說等他勝為貪利養恭敬故便爾自讚而毀他於彼有苦無怙者慳諸財法不施與他來諫謝不忍受內懷忿恨復捶打背捨大乘菩薩藏愛樂宣示相似法菩提賢師釋云猛利煩惱謂上品纏其罪謂具戒菩薩罪他勝謂是毀壞禁戒為他所勝等他勝者謂僅毀戒之因與諸苾芻犯他勝等非一切等非若苾芻犯他勝處於現法中不任更受此中所犯能更受故海雲疏云如彼聲聞貪淫欲法便毀自他即犯他勝如是菩薩愛樂味著利養恭敬便毀自他亦犯他勝若諸聲聞貪他財寶而盜取之是名他勝如是菩薩有諸財法而不惠施亦名他勝聲聞殺人即犯他勝如是菩薩起嫌恨心復以手足損惱有情他作損惱今來諫謝不聽不受亦名他勝聲聞妄說上人之法即名他勝菩薩有法而不宣說毀謗正法說彼非法亦名他勝又有疏云此中所說與別解脫他勝處罪種類因相皆相等故名等他勝又他勝數藏土有師說云八種然在本論僅說四種他勝罪法戒二十頌亦云當知其罪有四種若謂有八不應道理若如彼說有八他勝則應於一一他勝法中分說二法如讚毀等又藏土有師云如讚毀等一一他勝分說為二即成八種再加別解說四種他勝合成十二謂如貪油而乃持杖如是為貪利養恭敬自讚毀他尚屬他勝何況邪淫此亦當是海雲疏意然在海雲菩薩地疏中全無是說薩穆札戒品疏云若尚不貪利養恭敬應更不犯邪淫等四此中所說是謂不犯別解脫中他勝處罪非謂彼他勝罪即是菩薩他勝處罪上來諸義僅彼諸師自臆所造未一見之諸經論中當知所言四他勝者是約意樂他勝罪說謂於利養恭敬起貪求心於諸資財起慳吝心於諸有情起損惱心於佛正法起邪癡心是名四種他勝處法所言八者是約加行他勝罪說謂如讚歎於己譏毀於他不惠施財不給與法捶打有情不受諫謝背捨正法說相似法是名八種他勝處法以是言之雖說四種他勝處法無礙於八又如牟尼護念莊嚴論云菩薩藏中說有四種根本重罪又云自讚毀他四根本罪一一罪中各分為二即成八種根本重罪由論中有如讚毀等八罪分別海雲疏於第二他勝分說為二謂貧來求者不施與財來求法者不給與法並是他勝如是一一分別而說餘三他勝當知亦爾無畏生師亦云有八大乘寶要義論疏云無著菩薩於此顯然似說八種他勝處法阿底峽師亦依往昔善知識義而說有八是故於此說有八種他勝處法又學集論菩薩戒二十頌並似於第三他勝法說而為一此係譯文稍有別異若按其義實有二種戒二十頌舊疏與菩薩地所說亦同又智慧生入菩薩行論疏中引據學集論云由忿捶打諸有情內懷猛利之意樂不忍受彼有情諫於此他勝更分別說則如違犯罪中所云於來求法不施與於求財物不給施於他罵等輒還報他來悔謝拒不受憎背毀謗菩薩藏未精佛教勤外論勤修外道而愛樂如是等事皆名違犯今說他勝雖是相違然亦無過謂如不施法財二者由慳發起名他勝處非慳發起名違犯故又新疏云如不施法由發起故罪有差別於餘一切亦由發起而罪有別此如他打報打謂於他打而還報者即名違犯非報而打名他勝處不受悔謝非有嫌恨即名違犯若有嫌恨名他勝處背捨大乘亦有違犯與他勝別如薩穆札疏云若爾與前謗菩薩藏云何差別謂前是毀謗一切大乘菩薩甚深廣大二種法藏此則僅於素怛纜藏甚深一分不起信解而生誹謗然論本中則未說定是毀謗素怛纜藏甚深一分故精研外論是名違犯此有二種一者現有佛教於佛教中未精研究於異道論精勤修學即名有犯二者若上聰敏經久不失便得聽許於日日中常以二分修學佛法於異道論及諸外論得以一分方便隨學然亦不得深心寶玩愛樂味著若復爾者亦名有犯開示建立像似正法是名他勝謂彼不惟自起愛樂復自修習更如自修令他隨習海雲疏云開示建立非正法者犯他勝罪言愛樂者自欲樂故言宣說者如自愛樂向他說故言建立者自立一門令他趣入故自讚毀他說為違犯此與上來諸他勝法發起有異如後當說如是等罪不應以有無慚愧等分別是否他勝違犯若以有無慚愧等法而分別者是軟中品纏非謂他勝故二者餘論所說謂學集論所說一切根本重罪菩提賢師新疏謂彼論引虛空藏經所說根本諸罪非約受戒後說應立彼彼非根本罪而破彼彼是根本罪言立彼彼非根本罪者謂此諸罪非是能壞所具淨戒因緣如經中云灌頂剎帝利王有根本罪焚滅一切宿種善因遠離一切人天等樂趣向惡道墮他勝處此謂毀壞未受戒前所種善根及人天樂言破彼彼是根本罪者若此諸罪是能毀壞所具淨戒因緣則是他勝若爾具足淨戒菩薩於此一切他勝處罪隨犯其一即捨失戒況犯一切如是因緣菩薩地中應說然未說故又為剎帝利王說有五根本罪為初行住大乘者說有八根本罪如是剎帝利王等根本罪有別則是彼彼持戒亦應有異如是說者不應道理謂如經云剎帝利王五根本罪非是初行住大乘者根本罪初行住大乘者八根本罪非是剎帝利王根本罪則不應理由戒律儀無差別故無畏生師謂虛空藏經與菩薩地所說根本罪雖有不同無相違過謂由補特伽羅有中軟上品等分別如是所說根本罪亦有五八四等差別若更如是廣說罪別則如所云隨一補特伽羅亦得有餘一切罪謂如剎帝利王五罪是中品補特伽羅罪初行住大乘者八罪是軟品補特伽羅罪菩薩地中所說四罪是上品補特伽羅罪更就一一補特伽羅亦能安立餘一切罪如其所說則是三品補特伽羅各應有十七根本罪然菩薩地中第一他勝處罪虛空藏經已說若爾則虛空藏經應有十四根本罪更加菩薩地中三罪合成十七根本罪言菩薩地三罪者謂第二三兩罪及第四之愛樂宣說像似正法故彼師又說菩薩地中所說四罪能攝集餘一切諸罪餘一切罪無不攝於此四中故其攝集者一是能攝謂自讚等分說為八二是所攝謂所攝集背捨大乘為貪求利養恭敬故自讚毀他及攝虛空藏經諸罪更加善巧方便經中畢竟退失菩提心罪即成十四根本罪云何攝集謂令於他捨別解脫妄稱聲聞不捨貪等自說已得甚深法忍即是攝於自讚毀他故復次劫奪三寶所有財物褫奪比丘所衣袈裟拘罰沙門勒彼轉獻取正定物施口誦者是為慳財不施所攝謂性慳財起猛利貪於他財物阻彼受用而劫奪之或復任情而轉施之於所施物強力求取如是事類其性慳故復次破和合僧作無間罪令彼棄捨於奢摩他是為慳法不施所攝謂性慳法於一切法自不忍受復破他受起猛利慳自不正解亦復令他不獲解故復次肆行捶打毀戒比丘及除破僧餘四無間毀壞國邑及諸聚落是為捶打有情所攝復次令他棄捨聲緣乘法為愚癡人說真理義令彼畢竟失菩提心是為謗菩薩藏所攝謂聲緣菩三皆佛所說若令捨一便捨餘二自令愚人由是因緣謗真空理失菩提心捨大乘故復次執持邪見自他安住十不善道令大乘人退失菩提轉修小乘即為說像似法所攝謂餘二乘望大乘法便等像似法故藏土有師云由望所化機類有別經論所說意趣自殊所制軌法遂多差異是故若依學集論入菩薩行論軌法而受戒者當以虛空藏經所說為根本罪若依菩薩地軌法而受戒者當以菩薩地所說為根本罪藏土又有師云此由中觀唯識宗致不同而有別故然如上來菩提賢新疏所云不應道理謂與寂天釋經義量相違故謂如寂天菩薩學集論中先設問言剎帝利王與初行住大乘者於菩薩戒已具未具若已具者則不應分別剎帝利王五罪初行住大乘者八罪若未具者即不得謂彼彼犯罪云何名犯具彼戒之罪後作答言於一切罪隨其所犯立罪犯名令生怖畏如是一切皆名為罪各應遠離應如是說自不相違謂此根本罪若未具戒而有犯者則是毀滅一切善根不堪受戒若已具戒而復犯者其罪更大如其所說能毀未受戒前所有善根非能毀戒則是相違又彼疏謂如是等罪若是根本罪菩薩地中應說然未說故若以菩薩地中未說餘罪由是修學淨戒菩薩唯以四種為根本罪而不知有餘根本罪不知餘罪亦能毀戒由是不知有防護處即便有過若謂彼彼非根本罪菩薩地中應決定說非根本罪然未說故若以非根本罪為根本罪以非毀戒謂為毀戒亦是不知應防護處亦名有過復次虛空藏經所說諸罪菩薩地中亦未宣說菩薩地中所說違犯學集論中亦未宣說諸經論中非必悉說一切學處故菩薩地學集論中並謂如應詳諸經藏又如無畏生師所云以學集論所說為根本罪其意至當然以菩薩地中所說四罪能攝其餘一切諸罪如是攝集多非允善謂以一一別相攝於總相非所宜故又如上來藏土師云則學集論於釋難中已破其說謂具戒菩薩不應各別為立罪名又如上來藏土有師於大乘寶要義論疏云王之五罪非根本罪初行住大乘者八罪是根本罪又云龍樹無著二宗不同當知此學集論即是融會彼彼而說諸罪如其所說均是相違義亦不成蓋如虛空藏經所說諸根本罪寂天菩薩疏釋經義亦釋彼為根本重罪更攝是經及菩薩地二義而說糅合二宗義最允當如學集論舊譯云令易持故就彼彼罪攝集為一製為伽陀又如此論新譯云依一宗義攝為伽陀若如舊譯似以二宗攝為一義若如後譯依一宗義立聖無著一宗義故又入菩薩行論大疏亦說此為根本重罪善天疏亦云應先讀誦虛空藏經乃堪思擇根本諸罪謂諸罪中能毀戒者為根本罪虛空藏經已概宣說故應閲知解脫月疏亦云於能毀戒諸根本罪一一見諸虛空藏經遍照生疏說亦同前謂立彼彼是根本罪學集論中攝諸根本罪為伽陀云劫奪三寶之財物是為第一他勝罪背捨毀謗於正法佛說是第二他勝乃至毀戒諸苾芻奪其袈裟或捶打或復繫縛置牢獄逼令還俗捨出家造作五種無間罪執持邪見毀因果毀壞國邑聚落等佛說皆名根本罪為諸淺智諸有情宣說甚深真空理令入佛乘諸有情退失無上菩提道令彼棄捨別解脫而但修學於大乘妄謂聲聞緣覺乘不能斷捨貪惑等令彼持受捨二乘讚說自有勝功德為貪利養及恭敬設虛巧言呰毀他自謂已得甚深忍衒耀顛倒為他說濫權拘罰諸沙門於他所施三寶財強力求取轉獻彼令彼棄捨奢摩他取彼正定者財物轉施唯事口誦者如是皆名根本罪悉是大那落迦因爾時向虛空藏前夢中悔除捨諸罪畢竟退失菩提心慳貪不起哀憫故於來求者不施與內懷猛利意樂故不忍受彼有情諫忿而捶打諸有情由諸染欲隨順他愛樂宣說相似法云何第一他勝處法謂於三寶財物不與而取此中有六一財物主經中但云窣堵波物僧物四方僧物窣堵波者謂佛與法合諸僧伽稱為三寶所言佛者謂是佛身或諸佛像所言法者謂是經教或諸論釋所言僧者當有簡別若是凡夫須四苾芻方得稱僧聖者一人亦得稱僧四方僧者則無簡別又三寶者餘論有謂釋迦如來無漏滅道有學聖者此義不取以此中所說是窣堵波物四方僧物故又若劫奪窣堵波物或奪他人轉獻僧物四方僧物隨一皆犯非必劫奪一一三寶所有財物故二所取物經未明說當知所有田地屋宇飲食車乘即皆屬之物量多少亦未明說數亦難定當知凡所取物雖最微末亦成盜業若由他人所獻僧物或彼已受或彼未受若劫取者犯罪皆同謂由既已回施三寶即是三寶為物主故三能盜者盜僧物時要是自未與僧同分四劫盜意樂此復有二一者尋思謂有分別於三寶物意念盜取心無狂亂或無分別於二種物隨念盜取心無狂亂若誤盜者不名盜取三寶財物此為不與而取總相二者意樂發起謂三寶物非自所有而欲令彼遠離本處如是劫盜意樂或為自事或為煩惱而便發起非必由貪而便發起劫盜意樂若為利他具哀憫心而行劫奪有罪無罪如後當說例如某種戒根本罪在餘戒中可開方便而不得在本戒根本罪中開方便故五者劫盜加行謂是自盜或教他盜如是自作或教他作二罪相同若他不覺而盜取者或以勢力而強劫者皆名為犯故舊譯論云竊奪三寶之財物六不與取相謂欲獲得此他勝中有三他勝謂盜佛法僧所有物云何第二他勝處法謂於正法毀謗背捨此中有二一者所謗捨法經云謗聲聞法或緣覺法或大乘法復制他人不令修學是名第二根本重罪所言或者謂隨一種三乘經典隨一種經皆是正法謗大乘法謂若謗捨大乘甚深廣大隨一之法即名違犯此中所說與菩薩地所說謗大乘法是他勝處謂此大乘並示素怛纜藏甚深廣大二種法故如是若於小乘法藏聲聞乘法所說四諦緣覺乘法十二緣起若謗其一亦名有犯當知與謗大乘法等或作是問謗捨大乘隨一種法名違犯罪謗捨聲聞緣覺乘法說名他勝似不應理謂謗前罪比後重故答曰無過上下諸戒不必依其所犯大小制罪輕重此如別解脫中若殺人者名他勝罪以惡心故出佛身血名為重罪若大乘人於在家者所有財物不與而取不名他勝若於貧苦而來求者現有財物慳不施與即名他勝二者背捨之相學集論大乘寶要義論均引經云謗聲聞法或緣覺法或大乘法又制他人不令修學然考本經原文則云謗捨聲聞緣覺菩薩乘法隱蔽留難而不修學菩薩地中亦唯自謗大乘未說令他隨轉由此二說皆相等故此他勝支非必定須令他謗捨自謗捨者謂於正法謗謂非是如來所說問若爾違犯罪中謗捨聲聞乘法說名違犯即與此說相違答彼是輕蔑非謂謗捨如後當說此他勝中有三他勝謂謗聲聞緣覺菩薩乘法云何第三他勝處法謂是傷害出家苾芻此復有二一者所傷害人謂如經云依於佛法而出家者剃除鬚髮身被法服有戒無戒持戒毀戒即如前頌所云乃至毀戒諸苾芻句餘可例知二者云何傷害一者意樂謂由煩惱起損害心二者加行謂脫其袈裟或令還俗逼捨出家至如捶打或繫之獄或斷彼命犯他勝罪當知是為捶打傷害損惱有情他勝所攝又如劫奪出家具戒所有袈裟非是滿足四苾芻數當知即此他勝所攝至若滿足四苾芻數則是第一根本罪攝此他勝中有二他勝謂脫其袈裟逼令還俗云何第四他勝處法謂作五種無間罪業殺母弒父害阿羅漢破和合僧以惡心故出佛身血名五無間根本重罪又除破僧餘四無間是菩薩地第五他勝所攝云何第五他勝處法謂起邪見堅固執持妄說無有前世後世黑白業果作是邪見斷滅善根此他勝支非必教他行十不善自行十惡即名他勝云何第六他勝處法謂於住處加以毀壞此復有二一者所毀謂如國邑城市等處二者能毀此復有二一者意樂謂由煩惱起毀壞心二者加行謂以所有毀壞方便加以毀壞大乘寶要義論依經說云上來從一至五是剎帝利王五罪第六罪是大臣第二罪合上五無間罪中前四罪即是大臣五罪此中僅說毀壞住處他勝處罪至若毀壞諸國邑中有情根本罪則為捶打有情他勝罪攝毀壞彼中所有財物根本罪則為第一他勝罪或第十三他勝罪攝此他勝中有四他勝謂是毀壞國邑城市云何第七他勝處法謂為非器說甚深義此復有三一聞說者謂淺智人聞說甚深真空之理即生怖畏退失菩提二所說法謂是遠離一切戲論真空之理三既說已謂既宣說如是真空之理彼人聞已驚疑怖畏於大菩提心生退沒樂彼小乘此由不察彼器非器率爾說故若已觀察自謂彼人堪為法器然彼人者竟非法器不名他勝云何第八他勝處法謂令於他退失大乘此復有二一者能退失人謂是已入佛乘有情已發阿耨多羅三藐三菩提心住大乘者二者令退失相謂語他言汝力不能修六度行不能成就一切種智不如早發聲聞辟支佛心速盡生死入般涅槃問此中所云為是令他退失大乘抑或尚須退修小乘如入菩薩行論大疏云二者令他退失無上正等菩提復令轉發小乘之心是故尚須退修小乘云何第九他勝處法謂令棄捨別解脫戒此復有二一者聽信之人謂已如理修學別解脫毗奈耶者二者令聽信相謂語他言汝今何用受學毗奈耶戒汝當讀誦大乘經典疾發阿耨多羅三藐三菩提心淨除煩惱所生三業惡行謂彼唯說讀誦大乘發菩提心乃能淨除諸惡行故舊譯於此雖亦說云捨別解脫退所發心讀誦大乘然新譯文及虛空藏經所說為正入菩薩行論大疏亦云三者謂語他言汝當棄捨別解脫戒發大乘心讀誦大乘便得清淨問云何如後違犯罪中說云若諸菩薩立如是論菩薩不應學聲聞乘相應法教說名違犯謂如所說令他信解說名違犯令他退失棄捨所學說名他勝云何第十他勝處法謂是毀謗聲聞乘法此復有二一所謗處謂有學乘即諸學人所學乘法謂聲聞乘或緣覺乘或彼聲聞緣覺二乘二毀謗相謂以勝心作毀謗言汝二乘人僅學小乘不能斷除結使煩惱此如經云汝今不應聽受讀誦聲聞經典不應教他唯如是說犯他勝罪非必如經讀所說云汝當聽受讀誦清淨大乘甚深經典即名他勝又如經云若說是已有信受者彼我俱名犯他勝罪非必令彼持受捨二乘即名他勝此中所說彼聽受者犯根本罪當知彼人與第七第八根本罪中聽者不同前者是具戒人由聽信故退菩提心不列於此根本罪數後當廣說又此他勝與第二謗捨聲緣法有異謂前者謗經謂非佛說此是謗法謂彼不能斷除生死輪回根本云何第十一他勝處法謂是自讚及譏毀他此中有四一能說者謂如學集論引經云見他為人之所敬信亦懷憎嫉而自讚揚此謂毀謗人所敬信補特伽羅亦毀人所毀謗補特伽羅非唯毀他亦復自讚於一切人悉皆毀謗又異譯經中雖未說有為人敬信補特伽羅然有其義二所說事謂自功德及他惡譽三讚毀相謂為貪求利養恭敬故讀誦大乘為他解說作兩舌語而告人言我是大乘不求利養彼則反是經中所言妄說得上人法自讚當知非同下條妄說得上人法此與上戒同屬自讚品故四者發起言說為貪求利養恭敬故見他已得利養恭敬內懷憎嫉如經所云由憎嫉故而作四種不善語業寂天菩薩學集論中引菩薩地諸他勝罪獨未引彼第一他勝意謂第一他勝處罪與此義同菩薩地中所說之義當亦如此戒中所說然菩薩地所說之文則此戒中猶未能攝似以具引彼文為是復次若為自讚若為毀他或於利養或於恭敬隨貪其一皆名有罪如前所說所讚毀者為妄為實經中略云作兩舌語謂作妄語因緣得重大罪薩穆札疏云自實無德妄讚自德他實無過妄說他過新疏亦云讚者讚實功德非實功德非實功德而自讚揚是名倒讚前句並讚實妄功德謂所讚中有勝有劣非實功德而自讚者即是妄語云何第十二他勝處法謂是妄說得上人法此復有二一聽聞者謂能解義補特伽羅二所說相謂語他言修多羅中甚深空義我自證解以慈悲故為汝宣說汝等亦應當隨所說行當知是人於諸經法不如實解非由嫉妒而妄說法由染污心而妄說故令他有情聽信受持作是說者若是苾芻具菩薩戒即於同時犯二他勝入菩薩行論大疏云若唯口誦便自謂解甚深經法向他宣說令彼受持名根本罪如是說者與經有違云何第十三他勝處法謂是攫取三寶財物大臣宰輔依附國王拘罰苾芻勒彼財物又復令彼不善苾芻盜取僧物或僧伽物四方僧物窣堵波物而來報獻既得彼物轉獻國王王臣並犯根本重罪此中拘罰沙門根本罪攝於第三根本罪中取三寶財物根本罪攝於第一根本罪中此為強力求取轉獻彼根本罪謂第一根本罪即是自盜或教他盜此根本罪即為拘罰沙門勒他財物令他自盜或教人盜而自受其財物之罪此中所勒財物差別或係一苾芻物或二苾芻物或三苾芻物餘如前說一切應知云何第十四他勝處法謂是建立諸惡法等此中有二一者違法立制所制之人謂是如法修行苾芻所制之法謂以損害心違法立制令彼苾芻廢奢摩他毗鉢舍那及諸正法生多煩惱二者奪正定者所有財物此復有四一財物主謂諸勤修遠離苾芻此財物主若是聖者或滿僧數即名第一他勝處法此中所說財物之主非是聖者非滿四人僧伽數故二者財物彼所受用皆名財物三者意樂謂於彼等有瞋恨心四者加行於彼財物不與而取而轉施與唯口誦者如經所云彼二俱名犯根本罪言彼二者一謂國王二謂說正行者過惡苾芻有說彼口誦者亦犯根本罪與經有違如是皆名根本罪者謂從第七至第十四他勝罪每伽陀後應各加如是名為根本罪一語此八重罪即是經中初行住大乘者八罪悉是大那落迦因者謂是所造彼彼罪業夢中悔除捨諸罪者謂是犯已還出方便問有如是等根本重罪應如頌云上纏犯戒應更受云何復令悔除還出答能悔除故雖如經說能出惡趣然還淨時應當更受如是等義見諸學集論引方便善巧經所云犯根本罪能令還淨復次此義尚有多說謂所犯罪若不足於上品纏犯所共支分便屬軟中品纏他勝處法由悔除故復能還出後當廣說畢竟退失菩提心者謂捨願心此根本罪如方便善巧經所說若犯如是根本罪者必是具有菩薩戒人初一剎那退失其心尚未失戒第二剎那失所具戒非謂偶爾退失其心不名菩薩如退失心如是菩薩生起邪見當知亦爾如是二罪若生起者犯根本罪不須計彼是否具足上品纏犯所共支分餘則應計慳貪不起哀愍故於來求者不施與二語謂於來求財者不施於財來求法者不施與法內懷猛利意樂故不忍受彼有情諫忿而捶打諸有情三語謂與學集論舊譯有別如前所說由諸染欲隨順他愛樂宣說相似法二語前句如牟尼護念莊嚴論中引此論異譯云由諸染欲及隨他其文較善又如菩薩地云於相似法或自信解或隨他轉如是二語合言當有二說一由染欲說相似法是由自內非理作意二由順他說相似法是隨他轉二者他勝所作謂菩薩於他勝處法隨犯一種況犯一切不復堪能於現法中積集攝受廣大菩提資糧不復堪能於現法中意樂清淨是即名為相似菩薩非真菩薩德光云言積集者是增長義言攝受者是生起義又餘疏云不復堪能積集證入大地資糧言意樂清淨者諸疏謂是已入大地謂入初地以要言之於他勝罪隨犯其一即便不能於現法中證入初地謂於先時之所積集將入初地廣大資糧不能增長先所未集不能生起何況數數犯他勝罪故不應作犯他勝處仍可更受菩薩戒想於根本罪寧捨身命不應違犯如入菩薩行論云若根本罪力及菩提心力輪轉迭起伏登地甚遲遠所言四他勝者本論所說與學集論所說他勝所作並同虛空藏經亦復說有彼彼過失謂如經云初行住大乘者若犯如是根本罪已先所修習一切善根悉皆燒然是他勝處失人天樂以及大乘境界之樂墮於惡趣於長夜中流轉生死離善知識三者三種纏犯分別問何種纏犯不名捨戒何種纏犯得名捨戒答菩薩若用軟中品纏毀犯四種他勝處法不捨菩薩淨戒律儀若上品纏毀犯四種他勝處法即名為捨他勝處者如前所說約意樂罪有其四種約加行罪有其八種謂如貪求利養恭敬等乃至學集論中所說諸罪若不具足上品纏者不名他勝如是乃至有犯重於五無間罪謗大乘罪及為貪求利養恭敬自讚毀他若不具足上品纏者不名他勝自餘諸罪當知亦爾若復暫一生起邪見或稍退失菩提心者亦犯他勝不必具足上品纏犯如前已說故如虛空藏經所說諸罪若未具足上品纏犯應知即是軟中品犯本論所說他勝品中其尚未成他勝處者亦得說名軟中品犯所言上品纏犯者謂若菩薩毀犯四種他勝處法數數現行都無慚愧深生愛樂見是功德當知說名上品纏犯此有四支第一支者謂是毀犯四種他勝處法數數現行言四種者如或疏云此謂隨犯一他勝法非必四種悉皆毀犯言數數現行者如藏土有師云此是毀犯二次以上復有師云此須具備加行正行終行三事然諸疏中均無是說義亦非爾故不可憑此謂現行隨一犯他勝緣更於後時復欲現行即名數數現行如新疏云猛利煩惱謂諸煩惱既現行已後復數數現行不已曾不生起少分慚愧薩穆札疏亦云或於四種他勝處法或於四中隨一他勝後後時中復欲現行又海雲最勝子並云由彼數數現行如是他勝處法便能毀壞一切慚愧是故說云都無慚愧此謂由諸數數現行能壞慚愧義同上來二師所說復有疏云不出定時後當廣說第二支者謂都無慚愧言慚愧者如菩薩地云菩薩將欲現行罪時若能了知非我應作羞恥名慚又即於此恐他呵責羞恥名愧如是二法其所緣者謂自惡行其行相者謂是羞恥其分別者謂念此非我所應作內顧自己羞恥名慚若恐他呵外觀他人羞恥名愧如是二法於上中品乃至下品都不生起云何慚愧都不生起謂由現行能犯他勝諸惡行故謂犯他勝則此二法悉皆不生若生少分隨一慚愧不名他勝然則此二於何等時當能生起或不生起有說慚愧生不生者當在現行能犯他勝惡行之定時內然不應理後當廣說第三支者謂深生愛樂海雲最勝子並云以無慚心而深生愛謂由無慚於諸惡行深生愛著或由無慚及無愧故於彼惡行生起愛著薩穆札云由無慚愧於彼喜樂即名為樂此謂非惟於諸惡行無有慚愧更於惡行生起愛著海雲最勝子並云言愛樂者於諸惡行現行不捨問此諸支中初支為本若不具後則不名具上品纏犯所有支分是故復應添後支分然如第三深生愛樂於諸惡行現行不捨不捨惡行便無慚愧則是不須第二支分亦名具足上品纏犯答此中所言不捨惡行非見其過而不捨離謂自愛樂而不捨故如德光論師云言愛樂者愛是意樂至心愛欲樂是加行安住其事是謂意樂惡行名愛樂行惡行名樂如是說者似符論意問若爾則與數數現行意相重復謂若復欲現行惡行即是樂行惡行答無重復過前是希欲後是喜樂此二心所各有別故第四支者謂見是功德海雲最勝子並云於諸惡行不見其過若作是念如見其過便能生起羞恥之心何能於彼生起愛樂當知此語實不相違謂見其過生起羞恥是慚愧因非實慚愧如是雖復見其過失而亦愛樂隨之而轉如持戒人行非梵行薩穆札疏解愛樂義唯於二字倒易而說餘義同上德光論師云若於如是他勝處法念為功德而性好者是名見是功德此非即謂他勝處法無有過患如云五欲功德之欲是意所欲而非見為意所不欲諸疏所說皆同此義大乘寶要義論疏云言數數者超越定時無有間斷然如所說自讚等事亦無間斷即不應理古來諸德釋此義云於定時中不生慚愧無慚愧故即無間斷言定時者如優波離所問經云若諸菩薩日初分時有所犯戒於日中分不離菩提心是名菩薩戒身不壞如是若日中分犯於日後分不離若日後分犯於夜初分不離若夜初分犯於夜中分不離若夜中分犯於夜後分不離若夜後分犯於日初分不離菩提心是名菩薩戒身不壞如是由第一日初分至第二日初分晝中三分夜中三分一晝夜中總名六分若依上來諸德所釋如前之言則是數數現行都無慚愧二義為一即與論中原列二支所說相違又於論中所說支分添一定時則菩薩地上品纏犯支未具足又若任人可添支者則是論中支分無定可成衆多至無窮盡此不應理如後之言所立定時亦非經義謂彼經云優波離以是義故為諸菩薩說開遮戒為諸聲聞說唯遮戒優波離若諸菩薩於大乘中發趣修行日初分時有所犯戒於日中分不離一切智心如是菩薩戒身不壞若日中分有所犯戒於日後分不離一切智心如是菩薩戒身不壞若日後分有所犯戒於夜初分不離一切智心如是菩薩戒身不壞若夜初分有所犯戒於夜中分不離一切智心如是菩薩戒身不壞若夜中分有所犯戒於夜後分不離一切智心如是菩薩戒身不壞若夜後分有所犯戒於日初分不離一切智心如是菩薩戒身不壞優波離以是義故菩薩乘人持開遮戒設有所犯不應失念妄生憂悔自惱其心於聲聞乘有所犯者便為破壞聲聞淨戒何以故聲聞持戒斷除煩惱如救頭然所有志樂但求涅槃以是義故名聲聞乘持唯遮戒此中所說日初分中所犯之罪是根本罪云何知為根本罪耶由所答言菩薩乘人持開遮戒聲聞乘人持唯遮戒故又經總義云菩薩學處能還淨故聲聞所犯不能還淨故是故說彼為根本罪謂聲聞乘除根本罪亦可還淨非惟菩薩所獨有法若爾既云犯根本罪而又說云戒身不壞有相違過謂犯戒則戒壞故答無相違過謂學集論引彼經云戒身無邊謂若菩薩乘戒犯根本罪不堪更受即是有邊有窮盡時然菩薩戒堪能更受故名無邊如前所說立有定時亦不應理謂若許有定時則於定時之內便應還出如經所說日初分犯戒至日中分此二時中非定時故又論唯說有無慚愧及見其過或不見過經中唯說不離菩提願心而均未說有定時故若爾則是道炬論疏云六時又作十八分日初時中有三分初二分中若犯罪後分不忘菩提心猶復不失為菩薩後五當知亦如是義當何說答當知此文是示具戒行道弟子之相其前尚有句云遠離惡友應時修所言應時修者謂六時分一一時中於初二分有所違犯至後分中要當不忘於菩提心而修還淨若不爾者則與下士還出之軌有違疏文又云初分能淨為上士中士還淨於二分下士後分乃還淨若進而言此疏更說六九五十四種還出之軌謂上上士於初剎那分上中士於二剎那分上下士於後剎那分而得還淨此中是說還淨之軌非說他勝處法所犯時分若爾犯根本罪仍可還淨此戒為是菩薩戒耶為是菩薩乘中別解脫戒耶若為菩薩戒則如所謂不離願心便能還淨不應道理雖捨願心後更發心則先所受菩薩淨戒亦能生故若為菩薩乘中別解脫戒大小乘經多說毀犯別解脫戒他勝處罪後雖更受亦不還生如前所受別解脫戒故則由願心離與不離分別所犯能淨與否似不應理答寂天菩薩援引此經證知菩提心力能淨諸罪經意是謂雖或毀犯根本重罪不離願心戒可還淨雖由毀犯根本重罪障戒重生然由不離菩提心力能去彼障故可證知是菩薩乘別解脫戒以菩薩戒雖捨願心後還生故又如前引入菩薩行論云若根本罪力及菩提心力輪轉迭起伏登地甚遲遠即是捨離菩提願心所有過患言根本罪力者謂棄捨願心彼論又云此於諸菩薩罪中最為重言根本罪力菩提心力輪轉起伏者謂犯根本罪已復能生起願心之力由願心力便能還復生淨戒故優波離所問經云云何名為聲聞乘別解脫戒云何名為緣覺乘別解脫戒云何名為菩薩乘別解脫戒是問菩薩別解脫戒非謂菩薩戒故又如經中解答大小乘人別解脫云為諸菩薩說開遮戒為諸聲聞說唯遮戒廣如前說故知此是菩薩乘中別解脫戒若爾不離願心便可還淨若離願心不可還淨其別云何答非謂凡具別解脫戒犯根本罪皆可還淨無有差別謂是菩薩具足別解脫戒若犯別解脫根本罪犯已尋便不離如前所發願心便能更受若是菩薩犯根本罪於彼加行正行終行時中尋便捨離前所發心則是菩薩不堪更受若謂於此堪更受者則小乘人亦堪更受即為大謬日初分者謂由黎明至日未中日中分者是示犯罪已了之界如是若犯根本罪時尋便不捨所發願心由願心力雖犯彼罪此根本罪不能障彼戒力生起若捨願心即便不能去彼障力不能還淨又於未犯根本罪前便捨願心不得還淨故犯罪已隨即應當不捨願心此經密意云不捨者謂不捨離先所發心非謂爾時未發心故方便善巧經云善男子汝今當知具善巧方便菩薩摩訶薩或時值遇彼惡知識勸令退失無上道意得極重罪菩薩爾時即自思惟我今若或即於此身取證涅槃斷後邊際不復堪任被精進鎧何能度脫一切衆生輪回苦惱我今不應以此因緣自壞其心何以故我欲於輪回中度脫一切衆生設有極重罪亦不斷善根善男子如是名為菩薩摩訶薩善巧方便又善男子若出家菩薩有分別心生別異作意彼所得罪通四根本是菩薩若具善巧方便者隨即起悔我說彼菩薩為無罪者故犯罪人須是菩薩方可重受若彼人者先是餘乘犯根本罪後為菩薩亦復不可重受別解脫戒上來二經皆說菩薩乘中別解脫故其有誤解斯義謂大乘宗別解脫戒雖犯他勝後可重受得戒如前是大謬誤當知是大乘人可以重受非大乘宗悉可爾故又優波離所問經說大小乘別解脫戒有三種別一者不盡護戒與盡護戒二者開遮戒與唯遮戒三者深入戒與厭離戒有謂深入戒是菩薩乘別解脫戒死後不捨名為深入此不應理以彼經云如是菩薩成熟善根所有煩惱當漸盡除不應一生便盡諸結聲聞乘者成熟善根如救頭燃乃至不應起於一念更受後有如是深入厭離二義是說能更受諸後有或不能更受後有故上來廣辨其義已竟今說三品纏犯本義問上品纏中都無慚愧不見其過此二支分屬於遮詮後欲現行深生愛樂此二支分屬於表詮如是二遮詮支為應起於何時乃至何時二表詮支為應起於何時乃至何時答都無慚愧不見其過二遮詮支從初發起乃至正行具足恆常無間於此中間若起慚愧若見其過隨一現行上品纏犯便不具足如是後欲現行深生愛樂二表詮支亦於彼時發起乃至正行具足於其中間意未捨離非謂同一惡行無間現行故云何當是中品纏犯下品纏犯答海雲德光最勝子及菩薩戒二十頌舊疏中皆未宣說唯薩穆札疏說有二義一自宗義謂由煩惱生起煩惱隨順煩惱護持故乃成軟中上品纏犯初是暫生次是生已心隨煩惱後是煩惱勢力增上二他宗義謂如寶雲經云依諸三毒軟中上品而為分別如上二說義皆不合又戒二十頌新疏云於四支分更加他諫不捨一支具此五支是上品纏他諫若捨是中品纏不待他諫自能捨惡是下品纏此亦非理謂若諸疏儘可添支是菩薩地所立支數將無限故然則云何方名正義答上師無著僅說三種纏犯差別如是三種應先識知若不識知則不能辨何種纏犯應於三補特伽羅前行悔罪法何種纏犯應於一補特伽羅前行悔罪法此於餘品蓋未詳說當知可於上品纏中而解了之此中深生愛樂後欲現行不見其過二支比前二支煩惱粗重雖有前者以見其過亦能生起羞恥之心若都不見其過患者決定無能生羞恥故又見其過雖不能謂定生慚愧然若不見其過則慚與愧定不生故是故上品纏犯支未具時雖有餘支若見其過應知是名下品纏犯不見其過應知是名中品纏犯謂不見其過定無慚愧若有慚愧當知定是見其過故故此二支不須分列四者堪能還淨殊特謂諸菩薩暫一現行他勝處法非便棄捨菩薩律儀義非同於別解脫戒犯他勝法便捨所受別解脫戒謂如論云如諸苾芻犯他勝法即便捨棄別解脫戒又非同於別解脫戒犯他勝法捨已重受不能復生謂如論云若諸菩薩由此毀犯棄捨菩薩淨戒律儀於現法中堪任更受非不堪任如諸苾芻住別解脫戒犯他勝法於現法中不任更受有說一犯他勝處法不名捨戒要數數犯乃名捨戒此非論義設作是問別解脫中雖犯他勝若復發露先所捨戒亦得更受佛說如是名為具足云何說彼不堪更受答此有二說有謂若發露者不名他勝凡諸他勝皆有覆藏若有覆藏便可說彼不堪重受意謂彼是小乘之人如前已說有謂發露亦名他勝謂別解脫非是如諸菩薩律儀雖暫棄捨堪任更受何以故菩薩更受能生清淨菩薩律儀小乘更受不生清淨苾芻律儀故於此應觀人境差別乃能於彼說名具足或非具足故云何苾芻別解脫戒不可還淨菩薩律儀雖犯他勝仍可還淨答海雲論師云諸聲聞人別解脫戒為諸善法之所依故若毀此戒現行猛利無慚無愧壞慚愧故於現法中不復堪任重受律儀菩薩不爾謂諸菩薩於現法中雖捨菩薩淨戒律儀於現法中亦堪更受由未壞失慚愧心故此謂於犯別解脫戒他勝處法能壞慚愧若於毀犯菩薩律儀不壞慚愧故以別解脫是諸善法所依處故最勝子及薩穆札疏中亦作是說然依彼說設更有問犯別解脫他勝法者受菩薩戒當生不生依彼說者實難解答此義釋如前引優波離所問經云於聲聞乘犯他勝處便為破壞聲聞淨戒何以故聲聞持戒斷除煩惱如救頭燃以是義故名聲聞乘持唯遮戒方便善巧經云菩薩爾時即自思維我今若或即於此時取證涅槃斷後邊際不復堪任被精進鎧何能度脫一切衆生輪回苦惱又別解脫是大小乘補特伽羅所應共具故大小乘皆應具有別解脫戒然別解脫正為小乘補特伽羅而制謂小乘人於現法中能否堪證阿羅漢果雖未能知然彼皆是於現法中為盡諸漏被精進鎧誓斷諸惑如救頭燃故受戒時為於現法永斷諸漏設犯他勝而自覆藏便於此生不盡諸漏便失所有受戒本義若諸菩薩於菩薩戒犯根本罪猶非壞失受戒本義是則菩薩與諸苾芻於所犯戒堪能還淨或不能淨准此應知前引二經可證斯義又毗奈耶經大疏云為解脫故受諸淨戒若犯他勝便離解脫雖復有戒何異於無五者棄捨菩薩淨戒因緣略由二緣捨諸菩薩淨戒律儀一者棄捨無上正等菩提大願二者現行上品纏犯他勝處法若爾云何攝決擇分說有四種如攝決擇分云又捨因緣略有四種一者決定發起受心不同分心二者若於有所識別大丈夫前故意發起棄捨語言三者總別毀犯四種他勝處法四者以上品纏總別毀犯四種他勝處法由此因緣當知棄捨菩薩律儀後二種緣云何分別答菩薩地中說二捨緣攝決擇分數多於彼二不相違前者為本後為釋故此中捨戒第一因緣即謂發心謂是發小乘心發起與彼初受戒時為利有情願成正覺而受之心不同分心由彼發起不同分心便捨願心復次捨戒第二因緣謂於能解義趣者前故意發起捨戒語言令彼解了此與棄捨別解脫戒事有不同由彼不能持戒而捨斷彼律儀相應福德捨自戒法非為大罪於此則是棄捨菩薩淨戒律儀毀壞受時之所發起利益安樂無邊有情大弘誓願當墮惡趣長夜流轉謂若破壞一有情樂尚感惡趣何況毀犯一切有情利益安樂如入菩薩行論云若於許願已而不作彼業是名欺衆生我當至何趣先以劣少物思作惠施者後於彼不施尚感惡鬼趣況復以至心攝與無上樂設誑諸有情豈能生善趣又云若於剎那間障他所修福即損有情利當感諸惡趣壞一有情樂尚使自衰損況壞盡虛空無餘有情衆由是棄捨菩提願心或雖未捨所發願心然捨誓荷菩提之行過患相同故一切種不應棄捨如受戒時應先諦審若不爾者成大過患學集論中援引三經證成此義如前已說復次捨戒第三因緣已說總別毀犯四種他勝處法又於捨戒第四因緣復云以上品纏總別毀犯四種他勝處法者謂若未具上品纏犯則是所屬他勝品罪非實他勝亦不名為捨戒因緣若犯第四捨戒因緣亦犯第三故當說云以上品纏別犯一種他勝處法及彼總犯多種他勝處法是名後二捨戒因緣菩薩地中所說捨戒第二因緣抉擇分中復開為二故言四種者是廣列故至如成滿淨戒菩薩不捨無上菩提大願不捨所受菩薩淨戒亦不現行上品纏犯他勝處法雖復轉身上中下等在在生處不捨菩薩淨戒律儀即或轉受於餘生中忘失本念值遇善友為欲覺悟菩薩戒念雖數重受而非新受亦不新得此中所云上中下等如諸疏云上謂天上中謂人中下謂惡趣或由願力而生其處或為饒益一切有情而生其處或由業力而生其處又最勝子薩穆札疏並云雖受餘生亦終不造菩薩所不應作之業此由菩薩具足安住淨戒力故二違犯罪聚此復有二一者總說如是菩薩安住菩薩淨戒律儀於有違犯及無違犯是染非染軟中上品應當了知此中所言於有違犯及無違犯是染違犯非染違犯於違犯中一一當說軟中上品廣說如後二者廣釋此復有二一者違犯六度攝善法戒二者違犯饒益有情戒初犯六度攝善法戒復有六種初障布施次障持戒三障忍辱四障精進五障靜慮六障智慧初障布施此復有五一者正障財施頌云不以三門供三寶謂已皈依於三寶者更以發大菩提心者應向三寶於日日中承事供養不應一日有所間斷若不爾者即成違犯此中有三一者供處謂佛法僧若於如來或為如來所造制多若於正法或為正法所造經卷謂諸菩薩素怛纜藏摩怛履迦若於僧伽謂十方界已入大地諸菩薩衆言如來者佛自性身言制多者色身之像言正法者謂滅道諦是能證法言經卷者謂經論等是能教法言菩薩藏謂大乘法言僧伽者謂已登地諸聖菩薩言或為如來者謂如來制多隨一皆得言或為正法者謂證法教法隨一皆得言素怛纜藏摩怛履迦者謂經論等隨一皆得言若於如來若於正法若於僧伽者謂於三寶隨一供處而作供養雖作如是少分供養得無違犯二者供事謂於三寶供處所作供養大小皆得下至以身一拜禮敬下至以語一四句頌讚佛法僧真實功德下至以心一清淨信隨念三寶真實功德如是三事於諸供處不應或捨應於三寶隨一供處並應修作三事供養如新疏云當隨所有花等供養下至以身一禮拜敬薩穆札疏云若晝若夜設或不能廣修餘福及供養行下當以身一禮拜敬由作花等諸供養事亦得無犯三者供時謂若空度一日夜間曾未修作如是供事能生罪故即名有犯違越菩薩之法行故名有違越所言若已證入淨意樂地常無違犯謂由已得清淨意樂譬如已得證淨苾芻恆時法爾於佛法僧以勝供具承事供養是則已得清淨意樂入歡喜地諸大菩薩恆時法爾供養三寶故定不有如是違犯非謂已得入彼地者雖不供養亦無犯故此違犯罪若於學處以不敬心懶惰不信懈怠放浪而違犯者名染違犯若誤失念而違犯者非染違犯又新疏云貪瞋我慢等說名染違犯懈怠忘念等於供外非染卓龍云瞋等罪重故名染犯懈怠等罪事輕品微原應說名非染違犯如後所說然此乃謂懶惰懈怠亦名染犯由彼違越根本決定應作事故新疏云如是違犯能壞前說攝善法中廣大上妙供養之行二者障慳貪治頌云心於大欲而隨轉謂有大欲或無喜足或貪利敬而心隨轉生著不捨是染違犯此罪未有非染違犯若為斷彼生起樂欲發勤精進攝彼對治雖勤遮遏而為猛利性惑所蔽數數現行是無違犯然非無過新疏云如是違犯能壞律儀戒中少欲喜足及不貪求利養恭敬三者障無畏施有二違犯初對勝境頌云於諸耆德不恭敬謂若菩薩見同法中有持戒者臘長於己或有可信真實功德於此二緣可與談論故應於彼生啓敬信若不起迎不推勝座是有違犯次對恆境頌云他來語問不酬答謂若他來助歡喜故與己語言問病等故談論慶慰問餘義故乃至請問如是語問若不稱理發言酬對是名有犯言稱理者有疏釋云非為貪求利養等故而作酬答新疏釋云隨順正理而作酬答後說為當無違犯者於前二境或因自身一遭重病二自睡眠他以覺想而來親附語言談論慶慰請問雖未恭敬或未酬對亦無違犯或因時處一自為他宣說諸法或復與他論義抉擇二除前說二種人外而復與餘補特伽羅語言談論慶慰等時三聽聞他為己說法或聽聞他論義抉擇屬耳而聽雖未恭敬或未酬對亦無違犯或因隨宜一由起迎障他聞法致他不喜將護他故二欲將護說法者心不喜悅故三以不起迎等方便調彼伏彼出不善處安立善處四以不作禮拜語言護僧制故五以不作禮拜語言為欲將護多有情心嫌恨己故雖未恭敬或未酬對亦無違犯除上諸緣若憍慢制或嫌恨心損害於他懷恚惱心惱觸於他不起迎等名染違犯若由懶惰懈怠忘念無記等心之所發起非染違犯新疏云此二違犯能壞饒益有情戒中將護他心四者障他施緣此復有二一者不受延請頌云於他延請不受許謂他來請若是出家若是在家延往僧寺或往其宅奉施飲食及衣服等諸資生具若憍慢制懷嫌恨心懷恚惱心不至其所不受所請是染違犯若由懶惰懈怠之心不至其所不受所請非染違犯無違犯者或因自身一有疾病而無氣力二先受於餘有情請雖不往赴亦無違犯或因道路一處懸遠不易往赴二道有怖當有怨敵毒蛇怖害雖不往赴亦無違犯或因施主謂如知彼懷損惱心詐來延請雖不往赴亦無違犯或因隨宜一以不往赴等方便調彼伏彼如前所說二為無間修諸善法欲獲善品令無暫廢三為引攝所未聞義或為所聞法義無退四如所聞法義無退論義抉擇當知亦爾五為護他多嫌恨心六護僧制覆鉢等事雖不往赴亦無違犯二者不受資具頌云他施資具拒不受謂他施主持來種種生色可染末尼真珠琉璃等寶及持種種衆多上妙財利供具殷勤奉施由嫌恨心或恚惱心違拒不受是染違犯捨有情故若由懶惰懈怠之心違拒不受非染違犯無違犯者或於自身由觀受已心生染著雖拒不受亦無違犯若於施主一恐施後彼定追悔二由知彼於施迷亂三知施主隨捨一切若隨受者定當貧匱雖拒不受亦無違犯若於諸物一知此物是僧伽物窣堵波物二知此物非理劫得由是因緣多生過患或殺或縛或罰或黜或嫌或責或將受諸剜眼等罰雖拒不受亦無違犯最勝子云上來是說受者過患薩穆札疏云觀彼劫奪他財物者生此過患故拒不受新疏云此二違犯能壞饒益有情戒中作彼福田五者障於法施頌云於來求法不施與謂若於他來求法時懷嫌恨心懷恚惱心嫉妒變異不施其法是染違犯若由懶惰懈怠之心不施其法非染違犯無違犯者或因自身一遭重病二於是法未甚通利雖不施法亦無違犯或因隨宜謂以不施法等方便調彼伏彼如前所說雖不施法亦無違犯所調伏者有四非器初謂外道伺求過短二意不敬語不誠信身惡威儀而來聽受三是鈍根根未成熟於廣教法聞已難持深生怖畏不啓信解當生邪見雖復善喻亦不聽受增長邪執由此因緣多生非福起諸衰損又由彼緣當墮惡趣成諸惱壞四謂知彼法至其手轉布非器又此四中初伺過短非惟外道亦謂其餘二不敬等隨一即是三所云者非必全具上來所說七種違犯第二違犯是不應作而乃作之餘六違犯是於應作而竟不作又復應知第二違犯由一切時一切處一切惡友增上力故犯緣現前應當防遏善護其心新疏云此違犯罪能障攝善法戒饒益有情戒中布施之行次障持戒此復有三一者障於利他二者障於自利三者障自他利障於利他又復有二初說正障利他戒次說此與別解脫性罪差別初復有三一者棄捨深可愍者頌云捨破戒者不饒益謂於暴惡犯戒有情懷嫌恨心懷恚惱心由彼暴惡犯戒為緣方便棄捨不作饒益是染違犯若由懶惰懈怠棄捨由忘念故不作饒益非染違犯何以故謂諸菩薩應於暴惡犯戒有情具苦因者起憐愍心欲作饒益非諸菩薩於淨持戒身語意業寂靜現行諸有情所起憐愍心欲作饒益言暴惡者謂是造作無間等罪言犯戒者謂是毀犯根本戒罪薩穆札疏云前者多瞋後者弛戒無違犯者若因隨宜一為方便調彼伏彼二為將護多有情心三護僧制雖復棄捨亦無違犯二者不學共聲聞學頌云不等修學令他信謂薄伽梵於別解脫經毗奈耶律中除性罪外將護他故建立遮罪制諸學處於中菩薩與諸聲聞應等修學無有差別謂如聲聞應遠離者如是菩薩亦應遠離護他心者謂令在家諸有情類未淨信者令生淨信已淨信者令倍增長如制比丘不許飲酒禁非時食乃至掘地觸火等戒應等聲聞修學無別若不爾者非惟違犯別解脫戒亦且違犯菩薩淨戒何以故以諸聲聞自利為勝尚不棄捨將護他心何況菩薩利他為勝如新疏云若於此戒不敬不信不修學者是染違犯若由懶惰懈怠等心不修學者非染違犯問如是違犯為是在家菩薩所犯或是出家菩薩所犯答如新疏說是謂出家菩薩之戒然諸戒中亦多有同別解脫戒專為在家菩薩制者三者學聲聞不共學頌云於利他中少事業謂薄伽梵為令聲聞少事少業少希望住建立遮罪謂如十日作衣一月畜衣等事於中菩薩與諸聲聞不應等學若等學者是名有犯又於利他懷嫌恨心懷恚惱心少事少業少希望住是染違犯若由懶惰懈怠之心非染違犯何以故謂諸聲聞自利為勝惟自調伏不顧利他於利他中少事少業少希望住得名為妙至諸菩薩利他為勝於一切種唯為利樂一切有情非於利他少事少業少希望住得名為妙言少事者謂是少求言少業者謂是不畜諸多資具少希望住謂住聖種言聖種者謂於劣少衣食臥具便爾知足樂勤修斷名四聖種如是菩薩為利他故從非親里長者居士婆羅門等及恣施家應求百千種種衣服觀彼有情有力無力隨其所施如應而受薩穆札疏云覺彼安忍或不安忍此謂受已由是施主或當貧匱或不貧匱或為他人譏嫌與否如是說者不應道理謂如理求雖復多數無違犯故如說求衣求鉢亦爾如求衣鉢如是自求種種絲縷令非親里為織作衣亦無違犯如論所云令非親里為織作衣雖不酬價亦無違犯毗奈耶中以不酬價名為有犯為利他故應蓄種種憍世耶衣諸坐臥具事至百千生色可染百千俱胝復過是數亦應取積最勝子云言臥具者內藏絲絮言坐具者內實毛絨由為利他亦得許著憍世耶衣故亦開許絲絮毛羔及彼絲毛二分合物如是菩薩於如是等少事少業少希望住制止遮罪不應與諸聲聞共學上來所說二種遮罪及後所明諸性罪者謂是住菩薩戒出家苾芻學別解脫根本教誡謂別解脫有二種制一制性罪二制遮罪於性罪中修學之軌如後當說言遮罪者復有二類一者護他心故而制此罪如新疏云其苾芻衆決定當護自所學處何況菩薩為護他故更應修學謂諸菩薩將護他心過聲聞故二者少事少業少希望住而制此罪若諸菩薩為利他故不為此限由是不與聲聞共學如是性戒及二遮戒能攝一切別解脫戒或有未了如是等相妄自說言我是菩薩我持明者雖違彼戒我有最勝密乘戒故得放逸行如是說者雖彼具有上二種戒越菩薩制犯極重罪亦犯密乘淨戒粗罪謂如頌云於下二制戒不應越而越犯窣吐羅罪若不防護於二種戒而自許為大乘行者所謂大乘將何所依此是自以惡尋思水污佛聖教諸求法者應泯彼見棄之如毒如舊疏云若諸苾芻從非親里長者居士或長者婦乞求衣者犯捨墮罪當知能住二種戒者於此學處開為利他遮為自利上來諸罪若為自利非是利他而開許者當知仍犯毗奈耶中所說諸罪新疏云此三違犯如其次第能壞律儀戒攝善法戒饒益有情戒次說此於性罪與別解脫差別頌云由具悲愍非為惡此菩薩地乃至戒二十頌舊疏戒品二疏僅說開殺生等身語七支而未說云為利他故若不現行是違犯罪惟新疏中所列四十六違犯罪則以此事為一違犯謂彼疏云此開不等修學令他信之一戒而出然最勝子薩穆札疏並云當知此示菩薩聲聞所有性罪差別之相謂諸菩薩善權方便為利他故於別解脫所制性罪少分現行於菩薩戒無所違犯生多功德此所云者謂殺生等身語七支身所行者論中惟以欲邪行戒係為在家菩薩安立遮出家衆謂出家菩薩為護聲聞聖所教誡令不毀壞一切不應行非梵行餘不與取等六學處總為二衆菩薩安立若爾許開殺生等罪菩薩為是出家抑於在家若是出家則欲邪行及與殺生可許開遮應等無別以此諸罪並犯根本罪故若是在家則論所說亦自相違於欲邪行分其差別於餘諸罪未分別故學集論云若見有情增上義利為方便故應捨所學謂若菩薩多劫修習大悲為性圓滿一切所植善根諸貪欲等不能障故又方便善巧經云昔光明梵志於四萬二千歲中嚴持梵行行七步已發悲愍心念我若由捨禁戒故墮那落迦我寧忍受那落迦苦不應棄欲令彼命終即時光明梵志還至其所執彼右手作如是言姊起如其所欲如是云者寧不相違答曰無過菩薩為自利故應護不與取根本罪唯為利他亦得開許故於爾時非謂不與取等是根本罪是故出家菩薩亦不應犯殺生妄語等根本罪如非梵行等無有異若爾何故唯於非梵行戒分說在家出家差別答曰無過以雖違犯殺生不與取妄語等業尚不定犯根本重罪若受戒苾芻犯非梵行則是定犯根本重罪如是密意說彼差別與學集論亦不相違凡修梵行是能引發利他殊勝捨此無能利他增上設更見有增上有情義利在前須犯別解脫根本罪為利他故應捨所學當知是許在家菩薩非謂出家若許出家便捨學處無有是處復次為利他故行殺等業如是行者當是何人學集論舊譯云此謂勤修六度行人未登地者非謂餘衆新疏乃云是已登地諸大菩薩有謂既云已登大地又云方勤修六度行即不應理應依舊譯此似應理然如前學集論中引方便善巧經所說非謂地前初行六度便得現行必是經歷多劫修行善巧方便大悲成就大菩薩衆謂諸菩薩由已正受菩薩淨戒於菩薩學如理修習發起殊勝菩提之心愛他有情更勝於己善權方便為利他故捨殺生外無能救彼菩薩於此乃得開許非謂一切大乘行者悉可開許若僅初學菩薩戒者亦不許開何況餘諸不護淨戒自許大乘雖發相似悲愍之心或發相似菩薩心者決不應行如是亦如別解脫中若病苾芻不過午食有損於病食則有利便得開許然餘一切出家苾芻皆應守護又學集論所引經中雖僅說一非梵之行然殺生等餘根本罪如非梵行其例應知又妄語等四根本罪不與取罪如後當說謂諸如理護戒菩薩於彼有情欲致大利無餘方便令可獲得為利彼故應起現行復於爾時應審觀察自所發心有犯無犯當知此唯諸佛境界最極微細最難行故海雲最勝子薩穆札疏並謂如是行者當是已證清淨意樂無有染污獲得自在諸大菩薩之所行境非是劣慧微少善根貪求自利徒於經文生取著者之所行境此是諸佛現量證知非餘所作若妄作者招非福故所開性罪謂有七種一開殺生初所見境謂如菩薩見劫盜者為貪財故欲殺多生或復欲害大德聲聞獨覺菩薩造無間業次起意樂謂如菩薩既見是已發心思惟我寧斷彼惡衆生命墮那落迦終不令其無間業成墮那落迦當受大苦如是菩薩起憐愍心以自所受代他受苦於殺他時或以善心或無記心純是清淨無染污心有云菩薩為他所殺起是意樂不應道理如論所云深生慚愧謂法已匱除此無餘方便可得由是因緣深生慚愧雖斷彼命於菩薩戒無所違犯生多功德二開不與取此復有三一所見境謂如菩薩見有增上增上宰官上品暴惡於諸有情無有慈愍專行逼惱若不廢黜增上等位必將使彼多生非福所起意樂謂見彼已於彼發生利益意樂安樂意樂隨力所能廢黜彼彼增上等位二所見境謂如菩薩見劫盜賊奪他財物若僧伽物窣堵波物取多物已執為己有縱情受用所起意樂謂見彼已令勿受用如是財故免受長夜無義無利由此因緣逼而奪取還復僧伽及窣堵波三所見境謂如菩薩見彼衆主或園林主取僧伽物窣堵波物言是己有縱情受用所起意樂如上所說隨力所能廢其所主菩薩如是雖不與取無所違犯生多功德三開欲邪行初所見境謂如菩薩見有母邑現無繫屬繼心菩薩求非梵行若使菩薩懷恚惱心不隨所欲當致命終有疏說云既言母邑現無繫屬即應遠離行欲邪行然是說者不應道理此謂開許欲邪行故學集論云於僻靜處或有繫屬或無繫屬或護族姓或護理法或護門閥皆不犯於欲邪行戒謂於有夫無夫等境皆不犯於欲邪行故又學集論云於梵行者為欲成就彼義利故於彼應作母姊之想遠離邪行此說是在家身所行非順苾芻設見殊勝義利在前亦得棄捨所受學處此義如菩薩地所說新疏云欲邪行者是名有罪無間能令墮那落迦令多所化不信聖教諸世間人多住此行以是義故菩薩不應近欲邪行其殺人等亦不應作次起意樂謂勿令彼心生恚惱多生非福若隨所欲便得自在方便安處令種善根亦當令其捨不善業住慈愍心行非梵行雖習如是穢染之法無所違犯生多功德四開妄語初所見境謂如菩薩見多有情現有命難刖手足難劓鼻刵耳剜眼等難次起意樂謂欲救護彼諸患難次自他別如是菩薩若為自利雖至命難亦不明知說於妄語然為利他知而思擇故說妄語是為菩薩於自他別取要言之唯當覺察有情義利非無義利自無染心唯為饒益諸有情心覆想正知而說異語說是語時於菩薩戒無所違犯生多功德五開離間語初所見境謂如菩薩見諸有情為惡朋友之所攝受次起意樂謂由見彼近惡友故當受長夜無義無利由是因緣說離間語乖離他愛菩薩於此出離間語於菩薩戒無所違犯生多功德六者開粗惡語初所見境謂如菩薩見諸有情為行越路非理而行次起意樂謂由出粗惡語方便令彼有情出不善處安立善處菩薩如是出粗惡語於菩薩戒無所違犯生多功德薩穆札疏云行越路者謂行十惡或知大乘而行小道或知小乘而行外道非理行者謂雖知理而於學處懈怠不敬七開綺語初所見境謂如菩薩見諸有情信樂倡妓吟詠歌諷或有信樂王賊飲食蕩街衢無義之論次自他別及意樂者謂如菩薩於諸妓樂皆悉善巧於彼有情起憐愍心發生利益安樂意樂現前為所綺語相應種種倡妓吟詠歌諷王賊飲食淫衢等論令彼有情歡喜引攝自在隨轉方便令其出不善處安立善處菩薩如是雖說綺語無所違犯生多功德論中所說同大日經除開身語七支而外未開意三如法盛云若捨少分自利意樂唯為利他普於一切悲愍相應如是行者除意惡行或諸邪見餘皆開許然應審依抉擇菩薩淨戒等論謂應依諸聖言量故菩薩賢云如是雖開別解脫中所制性罪尚無違犯生多功德況諸遮罪以是義故於諸有情見有大利為利他故雖復開許共別解脫所制學處亦無違犯如前應知二者障於自利此復有三一者毀犯淨命頌云味邪命法持不捨謂是生起詭詐等事五邪命法無有羞恥堅持不捨不事除遣是染違犯此中無有非染違犯若為除彼生起樂欲煩惱熾盛蔽抑其心時時現起即無違犯此如心隨大欲而隨轉中所說五邪命相如寶鬘論云為求利養恭敬故密護諸根示詭相為求利養恭敬故先說軟語示詐相為求利養恭敬故讚他財物而虛談為求利養恭敬故現前毀他名巧求為求利養恭敬故讚先所得假求利有疏說云若起五種邪命之心不自覺知亦名有犯非論本意二者毀犯軌則頌云掉舉紛聒不寂靜謂心不靜貪分所攝為掉所動不樂寂靜高聲嬉戲喧譁紛聒輕躁騰躍望他歡笑是染違犯若由忘念如是現行非染違犯無違犯者若就自身為除彼過生起樂欲雖高聲等無所違犯如前應知若因隨宜一為方便解他所生嫌恨令息二為遣他所生憂惱三於他好如上諸事方便攝彼安立善處四於親友敬慎將護隨彼而轉五若見他猜阻於己內懷嫌恨惡謀憎背爾時便當外現歡顏用表內心清淨無染雖高聲等均無違犯三者味著諸有頌云一向心不生厭離謂由見諸經論所說諸菩薩法應住生死不樂涅槃便於爾時起如是見立如是論菩薩不應欣樂涅槃應於涅槃而生厭背於諸煩惱及隨煩惱不應怖畏而求斷滅不應一向心生厭離以諸菩薩三無數劫流轉生死求大菩提若作此說是染違犯何以故如諸聲聞於其涅槃欣樂親近於諸煩惱及隨煩惱深心厭離如是菩薩於大涅槃欣樂親近於諸煩惱及隨煩惱深心厭離應倍過彼百千俱胝以諸聲聞惟為一身解脫諸有便應如是勤修正行何況菩薩普為一切無量有情解脫諸有勤修正行是故菩薩當勤修集無雜染心謂自未能解脫煩惱何能解脫他煩惱故如大乘莊嚴經論云勇荷極重衆生擔應捨懈怠諸劣行為解自他纏縛故更應精進百千倍如是菩薩善權方便於有漏事隨順而行然應成就無雜染法超越勝出諸阿羅漢薩穆札疏云聲聞鈍根尚能了知輪回過患深生厭離何況菩薩利根具慧無量應知諸經所說菩薩不應欣樂涅槃應趣生死是說菩薩為利他故不應一向背生死流入趣涅槃及讚菩薩不為諸業煩惱所染非謂菩薩不應厭離諸業煩惱及業煩惱所感生死非不應樂滅煩惱業所證涅槃菩提賢云此三違犯如其次第能壞律儀戒中具足淨命不放逸行常樂遠離又凡酤售酒刀毒藥販賣生物壓胭脂子胡麻菜子皆是邪命說名有犯況諸漁獵三者障自他利此復有二初不護自譽頌云於惡聲譽不護雪謂自引生不堪信重之言所謂惡聲惡稱惡譽不護不雪其事若實而不避護是染違犯若事不實而不清雪非染違犯所言惡聲惡稱惡譽等三如卓龍云如其次第約上中下三品過患言不護者謂不預防其過將生言不雪者謂既生已而不息除無違犯者若所說人一是外道二是憎嫉補特伽羅雖善曉喻亦不信解三他忿蔽強欲謗說於如是等補特伽羅雖有惡聲不護不雪亦無違犯新疏中云若他外道於己憎嫉謂合前二為一外道有違論意若所說事一自出家二行乞食三因善行謗聲流布於如是事雖有惡聲不護不雪亦無違犯二者不作利他猛利加行頌云於他煩惱亦不治謂如菩薩見諸有情應以種種令他憂惱辛楚加行及以可憎身語現行調伏方便猛利加行令得義利護其憂惱於應調伏若不現行調伏方便是染違犯若觀由此令他有情於現法中少得義利多生憂惱雖不現行方便調伏亦無違犯言少得義利多生憂惱者有疏釋云於他有情少得義利而於自身多憂惱故又新疏云頌中亦字義謂於他有煩惱者非惟應施猛利加行亦應施以柔和加行疏意謂是於彼應施猛利加行亦應治以柔和加行若不治者亦名有犯應知此似誤解論義此亦字義謂他有情有諸煩惱或大違犯自能調伏亦不調伏新疏云此二違犯如其次第能壞攝善法中正念正知正行防護於自愆犯深諦審知善能對治悉使消除及饒益有情戒中訶責攝受三障忍辱此復有三一者不住安忍頌云於他罵等輒還報謂如捨離沙門四法是染違犯頌文罵字謂由瞋恚發詈毀語頌文等字謂瞋報瞋令他生起忿恚意樂出非愛語或打報打令生他起苦楚意樂而行捶打或弄報弄由是自他互舉過非二者不捨瞋相續心此復有二初不自捨頌云於他忿疑不往謝若己於他有所侵犯或自未犯彼疑侵犯於此隨一若起增上嫌嫉之心或慢所執羞於謙下不如理謝是染違犯若由懶惰懈怠之心及放逸心輕捨不謝非染違犯無違犯者若因隨宜謂欲方便調彼伏彼雖不悔謝亦無違犯若所謝境一是外道二彼希望要因現行非法有罪方受悔謝三因於彼性好鬥諍因悔謝時倍增忿怒四因知彼為性堪忍隨謝與否心無變異五因於彼不受悔謝及因悔謝轉生羞恥於如是等五種緣事雖不悔謝亦無違犯又此五中後二緣事在本論中似列為一然諸疏中別釋為二令從疏說二不捨他頌云他來悔謝拒不受謂他有情來相侵犯彼還如法平等悔謝懷嫌恨心損惱彼故不受其謝是染違犯雖復於彼無嫌恨心然由稟性不能堪忍故不受謝非染違犯無違犯者若因隨宜謂欲方便調彼伏彼雖不受謝亦無違犯或所受境謂不如法不平等謝雖不受謝亦無違犯前者謂於不應正理後者謂於唯託空言戒二十頌新舊二疏并云其後義者謂是非時謂不及時來悔謝故又新疏云若於外道或於性好鬥諍有情雖不受謝亦無違犯三者不起對治頌云懷忿惱心相續持謂若於他發起忿恚相續堅持生已不捨不見其過不行對治是染違犯若為斷彼生起樂欲雖勤遮遏未能斷捨即無違犯廣說如前菩提賢云此是發起忿恚執持不捨違犯上來所說四種違犯如新疏云初二違犯如其次第能壞律儀善法二戒欲饒益他及壞攝善法因緣根本煩惱少分煩惱忿恨等生亦不忍受後二違犯能壞何等彼疏未說四障精進此復有三初劣意行頌云貪求供事而御衆謂若非理貪著侍浴敷座役使所有供事及以希求供獻財物愛染之心管御徒衆是染違犯若無染心管御徒衆受諸供事則無違犯二懈怠行頌云懈怠懶等不遣除謂起懶惰懈怠等心及彼心攝耽睡眠樂臥樂倚樂非時非量忍受不捨是染違犯言非時者謂於晝中非睡等時言非量者謂如夜中除中夜外初後二分亦復非量無違犯者若就自身一病無力二行路乏三為斷彼生起樂欲廣說如前雖復忍受亦無違犯三貪著不正言論頌云貪說無義無利語謂愛染心虛度時日喜樂談說王臣盜賊婦女性好所有世事是染違犯若由忘念而現行者非染違犯薩穆札疏云此謂從他聽聞談說虛度時日言虛度者謂從日初至日中分及過日中至夜初等無違犯者若在聞者見他談說護彼意故安住正念須臾而聽如是雖聽亦無違犯若在說者以事希奇或暫問他若答他問如是雖說亦無違犯最勝子云若於學處勤精進時於如上事亦名有犯新疏云此三違犯能壞饒益有情戒中如法攝受徒衆攝善法戒中恆常勇猛精進修習六波羅蜜一切善品律儀戒中雖處雜衆不發諸惡雜染言論五障靜慮此復有三初障加行頌云不求請住三摩地謂欲定心內懷嫌恨憍慢所持不詣師所求請教授令心安住是染違犯若由懶惰懈怠二心而不求請非染違犯無違犯者若就自身一遇疾病無有氣力二知其師顛倒教授三自多聞能令心住雖不求請亦無違犯或先已得所應教授而不求請亦無違犯次障正行頌云不捨五蓋靜慮障謂於能障靜慮五蓋隨一生起忍受不捨是染違犯若為斷彼起樂欲等亦無違犯廣說如前何等五蓋如龍樹菩薩勸誡王頌云瞋掉舉惡作昏睡貪欲疑如斯五蓋賊常偷諸善利此中掉舉惡作合成一蓋昏睡合成一蓋言五蓋者說有二分初說蓋障及引發因次說云何淨除彼障初貪欲者謂心愛欲色聲五境隨逐而轉彼引發因謂於諸境生起增益可愛淨相非理作意次瞋恚者謂是於他起損害心作諸損惱彼引發因於違情境追念不已起忿怒心次惛沉者謂癡所攝內心惛昧不能自適又睡眠者謂癡所攝心不隨境二引發因謂心隨念暗冥之相無光明相次掉舉者謂貪所攝不寂靜相又惡作者掉已思維心生憂悔二引發因謂由尋思親里不死國土不死及念往昔戲笑歡娛諸所行事次疑蓋者謂於三世是有是無及於三寶或於業報乃至四諦以自妄情猶豫猜計彼引發因謂由緣慮三世等法非理作意次說云何淨除彼障此復有二初者以對治法而為淨除次者以身威儀而為淨除初復有三一者以增上法而淨除之謂若對治貪欲應修青瘀膿爛諸不淨想對治瞋恚應修慈觀對治昏睡應觀日月光明等相令心明了或修六念隨念佛法僧戒施天或復觀諸清淨緣相策發其心或觀諸方及月星等或以淨水洗沐頭面對治掉舉惡作應正住心於一境相修三摩地對治疑蓋應觀過去諸法已生及觀未來諸法當生唯法因果悉無有我於有謂有於無謂無如理作意遠離增損又應念誦經論所說訶棄五蓋及彼能引所有過患乃至讚歎遠離五蓋功德文句思惟其義未生諸蓋制令不生已生諸蓋悉令遣除二者由自修習而淨除之謂觀五蓋隨一生起便令自心生諸雜染致慧微劣損害善法非自應修深生慚羞於諸蓋障淨除不受三者依世間法而淨除之謂觀五蓋隨一生起或將生時若不淨除當為上師及能通曉他心諸天聰慧同法之所譏毀故未生者應制不生已生諸障悉令遣除次者以身威儀而為淨除謂於睡眠昏沉之蓋應起經行而淨除之於餘四蓋應跏趺坐以淨住法而淨除之又於諸蓋一切時中應捨不受非惟入住三摩地時三障終行頌云見味靜慮為功德謂若相續生靜慮時貪著其味味喜樂等見為功德是染違犯若為斷彼生起樂欲則無違犯如前所說諸論謂此是於靜慮喜足之過此未應理謂靜慮生有四煩惱一貪增上二慢增上三癡增上四見增上新疏云此三違犯如其次第能壞律儀戒中引發無量菩薩等持不起少分諸惡尋思攝善法戒中等至煩惱亦不忍受又攝善法戒中等至味著亦不忍受六障智慧此復有二初於劣境次於勝境初復有四一者輕捨小乘頌云輕謗聲聞諸法教謂若菩薩起如是見立如是論菩薩不應聽聲聞乘相應法教不應受持不應修學其文其義菩薩無用於聲聞乘相應法教聽聞受持精勤修學如是說者是染違犯應知此與別解脫戒根本罪中謗聲聞法復有差別此是妄執謂聲聞法是小乘人所應聽聞菩薩不應聽聞彼法非是畢竟謗聲聞法云何菩薩說此名為有犯謂諸菩薩尚應於彼外道書論精勤研究況於佛語云何論中制立此戒謂見於彼不正知者說大乘人不應修學別解脫戒造蔑法障為防護彼墮大險坑故制此戒當知此是最勝教誡若大乘人一向耽樂聲聞乘法回彼心故令樂大乘則無違犯二者於聲聞藏一向修學頌云捨自法藏修小乘謂如菩薩於應勤修菩薩法藏一切棄捨於聲聞藏一向修學是名有犯謂諸菩薩應於大乘勤學不捨乃能兼學小乘法藏三者於諸外論一向修學頌云未精佛教勤外論謂如菩薩現有佛教於佛教中應精研者未精研究於異道論及諸外論不應學者精勤修學是染違犯言外論者薩穆札疏謂為外道因明聲明等論前對小乘說菩薩藏此對外道總說佛教無違犯者若就自身一上聰敏二能速受三經久時能不忘失四於其義能思能達五於佛教如理觀察成就俱行無動覺者於日日中常以二分修學佛語一分學外則無違犯最勝子云上聰敏者謂少許時便能記念能思義者謂心鋭利能達義者謂慧明了如理觀察謂於大慧能俱生起能速受者謂速能學四者於外道論愛樂修學頌云勤修外道而愛樂謂諸菩薩應當不越菩薩所學依上軌則於異道論及諸外論研求善巧視如辛樂雖非所欲為利他故而習近之若不爾者初則寶玩次則愛樂後則味著是染違犯新疏云上來所說四違犯中初一違犯能壞攝善法戒心離不善諸惡尋思第二第三能壞攝善法戒尋求聞慧覺起思慧第四違犯能壞何等此疏未說次於勝境此復有三一者於諸慧境憎背毀謗頌云憎背毀謗菩薩藏謂如菩薩於菩薩藏憎背毀謗是染違犯云何聞已而生誹謗謂於聽聞菩薩法藏於甚深處最甚深處真實法義諸佛菩薩難思神力不生信解憎背毀謗言甚深者非凡夫境最甚勝者非二乘境真實法義諸佛菩薩難思神力謂是大乘深廣二宗隨毀其一即名有犯憎背誹謗有其四種一者謗說不能引義謂菩薩藏所說下劣非慧所依二者謗說不能引法謂菩薩藏能詮下劣非福所依三者謗說非如來說謂菩薩藏說者下劣四者謗說不能利益安樂有情謂以上來三種因緣而作毀謗或由自內非理作意或隨順他而作是說云何聞他謗大乘法自護其心謂若菩薩聞於甚深最甚深處心不信解菩薩爾時應強信受應無諂曲應如是學我今盲無無漏慧目於如來眼應隨說行若於如來密意語言而生誹謗非我應作菩薩如是自處無知仰推如來於諸佛法無不現知等隨觀見如是正行雖無信解然不誹毀則無違犯莊嚴經論云意罪性惡故不辨非理色況於猶豫法等置乃無過寶鬘論云如來密意語非易了知故一乘三乘法等置當自護等置尚無罪憎背唯罪惡謂諸初行住大乘者未易於法悉契自根雖無信解若等置者亦無所犯二者能壞慧果頌云復自讚揚而毀他謂若菩薩於他人所有染愛心有瞋恚心自讚毀他是染違犯染愛心者如新疏薩穆札疏並云是驕滿心亦是慢心最勝子云自貢執心義同前釋故此非同他勝處罪無違犯者若因隨宜一為住持如來聖教而欲摧伏諸外道時二欲方便調彼伏彼廣說如前三欲令他未淨信者生起淨信已淨信者倍復增長於如是事雖復自讚乃至毀他亦無違犯三者能壞慧因此復有二一者不往聽法頌云聞說正法不往聽謂如菩薩聞說正法論議抉擇憍慢所持懷嫌恨心懷恚惱心而不往聽是染違犯無違犯者若就自身一未覺知是說法等二有疾病無有氣力三了知彼是倒說者四正了知彼所說義是教所聞所持所了五已多聞具足聞持其聞積集六欲無間於境住心而勤引發菩薩勝定七自了知其慧鈍濁於所聞法難受難持難於所緣攝心令定於如是事不往聽者皆無違犯多聞三句謂聞聞知及聞具足難受等三謂聞思修或因隨宜謂為將護說法者心雖不往聽亦無違犯二者能壞聞境頌云毀師所說不依義謂若菩薩於說法師故思輕毀不以至誠於彼上師作導師想善知識想身不恭敬粗言嗤笑惡語調弄但依於文不依於義是染違犯所言依文不依義者謂於所說有義無文不事依止若於有文而無義者便爾依止有師釋云此是聞者謗說法師唯說其文不說其義或不知義如是說者殊非論意又菩薩地說四依時義同此說最勝子及薩穆札疏中說此是不敬法違犯上來所說三種違犯如其次第如新疏云能壞攝善法戒中遠離嫉姤積聞資糧於見尊長恭敬承事言依文者謂譏法師但依文句第二違犯饒益有情戒此復有二初於總相次於別相初復於二一者不作饒益頌云於應助伴不往助謂如菩薩於諸有情應作八事一於能辦所應作事二於道路若往若來三於正說四於事業加行五於掌護所有財寶六於好合乖離諍訟七於吉會八於福業於如是等所應作事懷嫌恨心懷恚惱心不為助伴是染違犯若由懶惰懈怠二心不為助伴非染違犯言正說者如卓龍云於諸未善說方言者教以方言餘七助伴廣如前說無違犯者若因自身一病無力二先許餘三轉請他有力者助四於善品正勤修習不欲暫廢五性愚鈍不善教授雖不往助亦無違犯或於所作謂知所作不順正理能引非義能引非法雖不往助亦無違犯或於其境一因知彼自能成辦二知求者自有依怙雖不往助亦無違犯或因隨宜一欲方便調彼伏彼廣說如前二為將護多有情等嫌恨之心三護僧制雖不往助亦無違犯二者不拔憂惱此復有二一者不為拔苦二者不拔彼因初復有二一者不拔病苦頌云見他有病不供事謂如菩薩見諸有情遭重疾病懷嫌恨心懷恚惱心於應瞻侍不往供事是染違犯若由懶惰懈怠二心非染違犯無違犯者若因自身一病無力二轉請他有力隨順令往供事三自了知其慧鈍濁於所聞法難受難持難於所緣攝心令定四先許餘雖不供事亦無違犯或於其境一知病者有依有怙二知病者自有勢力自能供事三了知彼長病所纏堪自支持雖不供事亦無違犯或因隨宜謂為勤修廣大善品為欲護持令無間缺雖不供事亦無違犯二者不拔衆苦頌云於他有苦不為拔謂此戒中有犯無犯是染非染如前不拔病苦所說所拔之苦能拔方便所有一切如前應知二者不拔彼因頌云不於放逸說正理謂如菩薩見諸有情為求現法後法事故廣行非理懷嫌恨心懷恚惱心不為宣說如實正理是染違犯若由懶惰懈怠二心不為宣說非染違犯無違犯者若因自身一自無知於應說法而無氣力二轉請他有力者說雖不宣說亦無違犯或於其境一知彼人自有智力能自悔除二彼有餘善友攝受三由了知為彼宣說如實正理起嫌恨心若發惡言若顛倒受四或知彼性弊𢤱悷於說正理不生愛敬雖不為說亦為違犯或因隨宜謂欲方便調彼伏彼廣說如前雖不宣說亦無違犯二於別相此復有二一者不作饒益二者不為調伏初復有六一者不酬有恩頌云不於有恩作酬報謂如菩薩於先有恩諸有情所不知恩惠不了恩惠懷嫌恨心不欲現前如應酬報是染違犯若由懶惰懈怠二心不現酬報非染違犯言不知恩惠者謂不欲報恩不了恩惠者謂不憶念其恩如應酬報者謂若不增其量而報亦當若等若下而酬報之無違犯者若於自身勤加功用欲報其恩無力無能不獲酬報雖不酬報亦無違犯或於其境謂欲報恩而彼不受雖不酬報亦無違犯二者不慰憂惱頌云於他憂惱不開解謂如菩薩見諸有情墮在喪失財寶眷屬或墮難處多生愁惱懷嫌恨心不往開解是染違犯若由懶惰懈怠二心不往開解非染違犯無染犯者應如前說於他事業不為助伴憂惱種類開解方便所有一切如前應知三者不濟貧苦頌云於求財物不給施謂如菩薩自有飲食資生衆具見有求者來正希求飲食等事懷嫌恨心懷恚惱心而不給施是染違犯無違犯者若因自身謂現無有可施財物雖不施與亦無違犯或於諸物一因彼物是不如法謂於現法及後法中當起過患二因彼物是所不宜謂他有情不宜求者雖不施與亦無違犯或因隨宜一欲方便調彼伏彼廣說如前二來求者於王匪宜將護王意三護僧制雖不施與皆無違犯四者不善御衆頌云不行利益徒衆事謂如菩薩攝受彼衆懷嫌恨心而不隨時無倒教授無倒教誡知衆匱乏而不為彼從諸淨信長者居士婆羅門所如法追求衣服飲食諸坐臥具病緣醫藥資生什物隨時供給是染違犯若由懶惰懈怠二心及放逸故不往教授不往教誡不為追求非染違犯無違犯者若於自身一病無力不任加行二轉請餘有勢力者雖不教等亦無違犯或因隨宜一以不教誡等方便調彼伏彼廣說如前二護僧制雖不教等亦無違犯或於其境一知徒衆世所共知有大福德而自力能求衣服等資身衆具二隨所知皆已無倒教授教誡三知衆內有本外道為竊法故來入衆中不堪調伏雖不教等皆無違犯其以財法攝受衆軌已說如前五者不隨順他頌云不能恆順他心轉謂如菩薩於他有情不隨心轉有所違犯是染非染如頃所說無違犯者若就自身一病無力不任加行雖不隨轉亦無違犯或因隨宜一彼所愛非彼所宜後將損彼或將自損二彼所愛非彼所宜而於多衆非宜非愛為護多衆嫌厭心故三護僧制四為降伏諸惡外道五欲方便調彼伏彼廣說如前雖不隨轉皆無違犯六者不讚有德頌云他有德譽不讚揚謂如菩薩於他實有如前所說信等功德及彼善譽不欲稱揚他實妙說不讚善哉由嫌恨心及由懶惰懈怠放逸等心有所違犯是染非染所有一切如前所說無違犯者若因自身一病無力不能讚說二為待他言論究竟雖不讚揚亦無違犯或於其境一若知彼性好少欲不喜讚揚將護彼意雖不讚揚亦無違犯或於所說一謂知彼雖似功德而非實德雖似善譽而實非譽雖似妙說而實非妙不讚揚等亦無違犯或因隨宜一以不讚揚等方便調彼伏彼廣說如前二護僧制三知由此顯揚等緣起彼雜染憍舉無義為遮此過四為降伏諸惡外道雖不讚揚皆無違犯二者不作調伏此復有二一者於非法行不行威折頌云不稱他緣作調伏謂如菩薩見諸有情應可訶責應可治罰應可驅擯懷染污心而不訶責或雖訶責而不治罰或雖治罰而不驅擯是染違犯若由懶惰懈怠二心及放逸故非染違犯無違犯者若因自身謂觀待時雖不訶責乃至驅擯亦無違犯若於其境一了知彼不可療治不可與語喜出粗言多生嫌恨二了知彼成就增上猛利慚愧疾疾還淨雖不訶責乃至驅擯亦無違犯或因隨宜一觀因此訶責等故鬥訟諍競為遮此過二觀因此令僧喧雜令僧破壞為遮此過雖不訶責乃至驅擯皆無違犯言鬥訟諍競者如卓龍云初一總言餘三別說相罵相斥訴於王臣二者於背聖教不作調伏頌云不現神通作怖攝謂如菩薩具足成就種種神通變現威力於諸有情應恐怖者能恐怖之應引攝者能引攝之見聖教中不持戒者難消信施若不現諸神通怖攝令彼避受如是信施是名有犯非染違犯戒二十頌二疏中有謂此是是染違犯是字恐誤無違犯者若惡外道多著僻執誹謗神通為咒為藥不現神通恐怖引攝即無違犯新疏云上來所說十二違犯一一能壞饒益有情戒復次頌云具足悲心與慈心及善心者無違犯此謂如前所說開遮諸戒若為悲愍於諸有情及以慈心於諸有情為作饒益及欲方便調彼伏彼令出不善安立善處如是現行皆無違犯菩提賢謂此中及字能攝諸義若心極煩惱若重苦逼切睡眠及狂亂雖作而無犯此二語義如彼所說能攝決擇分中若心狂亂若重苦受之所逼切皆無違犯又寂壽論師云此頌有如下文所說貪心相應而犯戒者不名有犯後說為是二者護彼心相上來所說如是種種菩薩學處佛於彼彼素怛纜中依律儀戒攝善法戒饒益有情戒隨機散說無著菩薩今更於此菩薩法藏摩怛理迦綜集而說非是自撰如是菩薩於諸學處應起尊重住極恭敬精勤修學從他正受戒律儀已當由具足三種意樂於諸學處生起最極尊重恭敬於佛所制從初專精不應違犯所言菩薩三種意樂謂善清淨求學意樂菩提意樂饒益一切有情意樂如是三者餘疏謂是學三聚戒然初意樂謂是求學學處自性三聚淨戒後二意樂謂是為求大菩提故及利他故而勤修學是說可依從他正受戒律儀已生起最極尊重恭敬從初專精不應違犯此如菩薩地第十八章云若諸菩薩現前自稱我是菩薩於菩薩學不正修行當知是名相似菩薩非真菩薩若諸菩薩現前自稱我是菩薩於菩薩學能正修行當此是名真實菩薩是故菩薩莫作是念於諸學處雖應正行然不正行亦非下劣菩薩應念諸聖教誡正受菩薩戒律儀已應依六度四攝之行精勤修學隨順佛教深廣理趣循諸先覺大法轍行不應顧彼昧諸聖教違勝義者之所言說三者犯已還淨方便謂諸菩薩從初專精應無所犯設由無知放逸雜染不敬四緣而違犯者即應如法疾疾悔除令得還淨又如菩薩於諸學處有所違越除他勝外當知皆是違犯所攝非如別解脫戒有多種類若犯此戒應向有力於語表義能覺能受小乘大乘補特伽羅依悔罪法發露悔滅其悔罪處若無具有菩薩戒者應向具足別解脫戒男女苾芻而行悔除不應向勤策等而行悔除謂勤策等尚非犯別解脫悔罪處故若犯戒者是出家身現有出家是悔罪處亦不應向在家菩薩而行悔除若諸菩薩以上品纏違犯如上他勝處法由此即失淨戒律儀便如論云應當更受攝決擇分亦云若有還得清淨受心復應還受藏土有師云得兩次受不應再受又有師云初受一次重受兩次既三次已不許再受由彼犯者太無慚故此解更受二字字義實不應理言更受者望前初受說名更受非謂以後不許受故印土聖典均未說有彼數量故薩穆札疏云設由煩惱犯極重罪向諸僧伽作懺悔已由利益諸有情意樂發菩提心由淨意樂應當更受言更受者非唯兩次望前初受說後名更若中品纏違犯如上他勝處法先當稱述所犯事名應作是說長老專志或言大德我如是名違越菩薩毗奈耶法如所稱事犯惡作罪餘如苾芻發露悔滅惡作罪法應如是說所稱事者謂如稱說所犯罪名例云自讚或云毀他所言餘者復應添說如舊疏云如是衆罪我今敬向於長老前發露悔除更不覆藏我今悔露得安樂住若不悔露不安樂住長老問言汝於此等見其罪否應答言見問後能護否答言如法如律敬善頂持第二第三亦如是說又新疏云於所犯罪知見憶時如法如律善為奉持又餘疏中於問護否唯作答言敬善護持爾時所作身業威儀如新疏云向悔罪處合掌禮拜次於下方蹲跪而坐合掌如前若下品纏違犯如上他勝處法及餘違犯應對於一補特伽羅發露悔法當知如前若無隨順補特伽羅可對發露悔除所犯爾時菩薩以淨意樂起自誓心我當決定防護當來終不重犯最勝子等謂此顯是由加被力得無違犯然非論義又菩薩戒二十頌攝此義云上纏犯戒應更受中纏應向三人悔餘染非染悔於一或自心悔亦如彼後二句義謂於悔除是染非染諸違犯罪若無隨順補特伽羅現在於前如是菩薩應於爾時以淨意樂起自誓心一向慚愧調伏寂靜後不還作而行悔除如向於一補特伽羅發露悔法而行悔除寂壽論師云或自心悔亦如彼者示餘還出還淨方便如論所云若無隨順補特伽羅等文可證是合中下品纏而說菩提賢云中下纏犯與餘違犯還淨之理非可同論若中下纏現前不能得一或三補特伽羅須往餘求若違犯罪於現前中不能得一補特伽羅不須他求起自誓心防護即出後者悔處未有定制前二悔處有定制故若不爾者論中制定向三或一補特伽羅而行悔除則不應理若不足三補特伽羅悔且不淨何況僅於自心防護而能淨除以菩薩地未說或自心悔亦如彼故故如是說非應正理應正說云餘罪悔露於一人染非染罪於自心謂菩薩地於中下犯說對三一補特伽羅於餘違犯若無隨順補特伽羅應於自心誓防護故如其所說違舊疏義實不應理菩薩地云若下品纏違犯如上他勝處法及餘違犯應對於一補特伽羅發露悔法當知如前若無隨順補特伽羅可對發露悔除所犯爾時菩薩以淨意樂起自誓心我當決定防護當來終不重犯如是於犯還出還淨此中明說下品纏犯還淨方便同餘違犯下品既爾中品纏犯其理正同由淨意樂犯已還出防護當來終不重犯此是犯已還出通義又菩薩地雖未說有或自心悔亦如彼之文然有其義謂如論云若無隨順補特伽羅可對悔除起自誓心決定防護如向於一補特伽羅悔除還淨故又或師云若染違犯於有可向悔除處時應向於一補特伽羅而行悔除非染違犯現雖有可向懺悔處然自心護亦得還淨如其所說不應道理菩薩地中不分說故謂如中下二品纏犯及諸四十五種違犯若現前有可向悔露補特伽羅不行悔除唯自心護亦復不能還出還淨此應如論所說而行由諸違犯以能對一補特伽羅發露悔除易生慚愧故應依一補特伽羅若未遇者即應想對諸佛菩薩而行悔除如戒品云於自愆犯審諦了知深見過失既審了知深見過已其未犯者專意悔持其已犯者於佛菩薩同法者所發露悔除菩薩地第十七章云又諸菩薩過去現在一切誤失一切違犯以淨調柔愛樂隨順所學戒心想對十方佛世尊前至誠發露悔往修來亦勸導他令行是事如是數數發露所犯少用功力一切業障皆得解脫學集論云夢中虛空藏菩薩前行懺悔法最為殊勝謂諸菩薩於輕重罪悉應悔除此如優婆離所問經云舍利子菩薩所犯重罪有二何等為二一者瞋相應犯二者癡相應犯乃至舍利子若有菩薩初犯重罪應對於十補特伽羅以質直心殷重悔除復有重罪應對於五補特伽羅殷重悔除舍利子執女人手非理相顧無義利心應對一二補特伽羅發露悔除若菩薩犯五無間罪由女人所生罪由手所生罪由童子所生罪犯塔犯僧及犯餘罪即應向於三十五佛晝夜獨處殷重悔除然優波離請問經本經譯云初犯重罪應對十衆以質直心殷重悔除此說甚當謂如前說二重罪中初瞋相應犯應對十衆前懺悔故又本經云復有重罪應對五衆而行悔除謂第二重罪癡相應犯故本經又云執女人手所犯重罪應對五衆發露悔除此譯未當以與學集論中所說應對一二補特伽羅發露悔除之語不合亦與經說貪相應犯其罪尚輕之義相違故又舊譯學集論謂執女人手等三重罪應對一二補特伽羅而行悔除說此三罪名為重罪在新譯中說為輕罪當知較確又本經中未有無義利心罪文當係語缺以學集論皆有之故又瞋相應說名重罪無義利心說名輕罪亦不相違謂由無義利心僅起侵犯意樂實無損害心故又五無間說名重罪當向三十五佛晝夜悔除謂雖僅對補特伽羅三悔所犯於還出軌仍不能淨苦異熟故入菩薩行論云晝夜各三次讀誦三聚經依佛菩提心滅除餘違犯如是還出方便謂於根本罪外諸罪或由有念所造罪外所餘忘念不正知等所犯諸罪應當讀誦三聚懺經依諸佛力及菩提心悉令滅除智慧生云言三聚者謂是懺悔隨喜回向當知是名悔罪方便又善天謂佛菩提心是所依力謂皈依佛發菩提心菩薩學處雖無有量此還出法特為重要謂於有念所作罪外餘諸違犯悉能淨故雖復懺悔往昔所犯若無防護當來終不重犯之心亦難清淨如慈氏獅子吼經云慈氏後五百歲正法衰微頗有自稱我是菩薩彼等不護身語意業多犯重罪多行惡業唯念悔除便得清淨於當來時不善防護或雖防護而不正護慈氏我為淨除往昔所造諸惡業故乃為宣說三聚法門世人無知貪造衆罪既造罪已唯念悔除便得清淨不護當來如是犯已還出方便是淨尸羅極重要支廣如諸菩薩論所說四者說貪是輕罪密意謂世尊說凡諸菩薩多分是由瞋所起犯非貪所起當知此中所說密意謂諸菩薩愛諸有情憐諸有情增上力故凡有所作一切皆是菩薩所作非作所作可得成犯若諸菩薩憎諸有情不能修行自他利行作非菩薩所應作事作不應作可得成犯大乘莊嚴經論云由利有情故起貪不名罪瞋則與彼違恆欲損他故優波離所問經云若諸菩薩修行大乘於恆沙劫貪心相應而犯戒者其罪尚輕若一瞋心而犯於戒其罪甚重何以故因貪犯戒攝受衆生因瞋犯戒棄捨衆生優波離所有諸結能攝衆生菩薩於此不應生畏所有諸結能捨衆生菩薩於此應生怖畏以是義故大乘之人因貪犯戒我說是人不名為犯此中義趣或難領解寂天菩薩釋其密義如學集論云是義云何謂能攝護一切有情如前已分別說謂如前說光明梵志於利有情許開貪欲如是現行與貪相應說名無犯非謂菩薩一切時中可貪欲故如經前說因貪犯戒攝受衆生故以何等身與貪相應不名為犯學集論云經所云者謂有增上意樂與悲憫心與貪相應不名為犯如前經云優波離若諸菩薩無善方便貪相應犯便生怖畏瞋相應犯不生怖畏若諸菩薩有善方便貪相應犯不生怖畏瞋相應犯生大怖畏善方便者謂是具足悲智二心不捨衆生謂應堅固大菩提心大悲為本成就通達諸法實相勝智慧力故於貪瞋分別說有犯不犯者謂若貪中無有慈心與瞋所犯當知同等又若貪中具有慈心與瞋所犯當知非等諸有智者不應啓疑非謂菩薩一切時中所起貪心皆無違犯應如學集論中所說見於有情有大義利於諸有情起慈愍心雖貪相應不名為犯問非無義利與瞋相應起諸忿惱有犯無犯答應分別說若開許瞋習氣增上則壞悲心即名為犯若壞悲心斷根本故後當廣說縱為利益一切有情然由菩薩壞悲心故即永壞失有情義利故不開許又菩薩身如功德女由貪愛難提迦菩薩增上力故死生天上若瞋菩薩則如頌云佛說如起惡心量爾許劫住那落迦故不相等如學集論所釋貪心無犯等義菩薩地中所示密意當知亦爾五者分別下中上品諸罪謂如攝毗奈耶事摩怛理迦所說由五因緣當知所犯成下中上三品差別何等為五一由自性故二由毀他故三由意樂故四由事故五由積集故一由自性者謂他勝罪聚是上品罪衆餘罪聚是中品罪所餘罪聚是下品罪復有差別謂他勝衆餘是重品罪隕墜別悔是中品罪惡作罪聚是輕品罪二由毀犯者謂無知故及放逸故所犯衆罪是下品罪煩惱盛故所犯衆罪是中品罪由輕慢故所犯衆罪是上品罪三由意樂者謂由下品貪瞋癡纏所犯衆罪是下品罪若由中品是中品罪若由上品是上品罪四由事者謂雖現行相似意樂而由是事非一類故應知所犯成下中上三品差別如以瞋纏於旁生趣所有衆生故思殺害生隕墜罪或於其人或人形狀非父非母故思殺害生他勝罪非無間罪即以如是相似瞋纏於人父母故思殺害生他勝罪及無間罪五由積集者謂如有一或犯一罪不能如法速疾悔除或二或三乃至或五如是應知由積集故成下品罪從此以後或犯十罪或犯二十或犯三十乃至或犯可了知數罪不能如法速疾悔除如是應知由積集故成中品罪若所犯罪其數無量不可了知如是應知由積集故成上品罪此中由自性故及由事故不相等同餘三皆等又彼略由四因緣故犯所犯罪一無知故二放逸故三煩惱盛故四輕慢故謂若有一於所犯罪不審聽聞不善領悟無有覺慧無所知故於其所犯起無犯想而犯衆罪是名由無知故犯所犯罪又若有一於所犯罪雖有覺慧亦有所知而住忘念住不正知由彼如是不住念故而犯衆罪是名由放逸故犯所犯罪又若有一於其所犯雖有覺慧亦有所知而彼本性貪瞋癡等極為猛利彼由猛利貪瞋癡故雖知是事所不應為煩惱纏逼不自在故而犯衆罪是名由煩惱盛犯所犯罪又若有一於所犯罪雖有覺慧亦有所知而彼信解極為下劣無有彊盛宿善因行由其信解極下劣故於沙門性於般涅槃無有顧念於佛法僧無敬無憚無有羞恥不樂所學由輕蔑故隨其所欲廣犯衆罪是名由輕慢故犯所犯罪當知此中無知放逸所犯衆罪是不染污由煩惱盛及以輕慢所犯衆罪則是染污云何對治謂有四法一者依止覺慧二者正念正知三者精勤對治煩惱熾盛四者有慚愧心恭敬上師尊重所學六者住安樂因謂諸菩薩依止一切自毗奈耶勤學所學便得成就三種圓滿安樂而住一者加行圓滿謂諸菩薩初於淨戒行無缺犯於身語意清淨現行次於所學尊重恭敬住不放逸不數毀犯後時設或有所毀犯悔露自惡由是自見清淨無犯晝夜歡喜安樂而住二者意樂圓滿謂諸菩薩為法出家不為活命求大菩提非為不求為求沙門為求涅槃非為不求如是求者唯於善法發勤精進不住懈怠下劣精進不雜衆多惡不善法由此能引無諸雜染安樂而住不善法者謂是法能合於現法多生雜染引招後有言雜染者能惱身心有諸熾然言後有者能感惡趣衆苦異熟當來長夜生老病死沙門果者謂十地中三學行位言涅槃者無住涅槃最勝子云沙門涅槃皆是加行所引之果三者宿因圓滿謂諸菩薩昔餘生中行施修善故於今世種種衣服飲食臥具病緣醫藥資身什物自無匱乏復能於他廣行惠施永離貧匱安樂而住如是菩薩依毗奈耶勤學所學成就如是三種圓滿安樂而住與此相違當知成就三種衰損危苦而住如是略詮自性廣說一切宣說菩薩若在家品若出家品一切戒已自斯以後即於如是一切戒中分出所餘難行戒等差別之相應當了知三者論彼差別此復有七謂由難行戒乃至清淨戒初說難行戒此略有三若諸菩薩現在具足大財自在有增上力棄捨如是大財自在受持菩薩淨戒律儀是名菩薩第一難行戒言大財者當有四種一者自身受用圓滿二者多諸助伴親愛共同受用三者廣有僕使受用四者飲食豐饒於此加列長壽受用即名五福大自在者謂所言說有大威力如欲自在有疏更以自在增上分說為二又諸菩薩雖遭急難乃至失命於所受戒尚無少缺何況全犯是名菩薩第二難行戒又諸菩薩受淨戒已如是如是遍於一切行住作意恆常安住正念正知五不放逸乃至命終於所受戒無有誤失尚不犯輕何況犯重是名菩薩第三難行戒如是三種難行戒餘疏有說初是難受次是難護後難究竟德光則謂唯分難受難護二類初是難受後二並是難護之戒是說為當謂後二中初難護者依諸逆緣乃至命難於所受戒守護不犯後難護者一切時中於所受戒乃至輕罪守護不犯如是三戒雖於現生不能正學亦應發願依覺慧力於餘生中如是修學次說一切門戒當知此戒略有四種一者正受戒謂正加行受先所受三種菩薩淨戒律儀即律儀戒攝善法戒饒益有情戒二者本性戒謂諸菩薩不待思察正願正行便能覺知自具六種波羅密相住種姓位本性仁賢於相續中身語二業恆清淨轉三者串習戒謂諸菩薩昔餘生中曾串修習如先所說三種淨戒由宿因力所住持故於現在世一切惡法不樂現行深心厭離樂修善行於善行中深心欣慕四者方便相應戒謂諸菩薩依四攝事調伏方便於諸有情身語善業恆相續轉如是四戒是能趣入一切戒門故名一切門戒言四攝者一者布施謂是財攝二者愛語謂攝受已於取捨處施以教授三者利行於所說義勸令修行四者同事如勸他行自亦如是共彼安住三說善士戒當知此戒略有五種一者自具尸羅二者於恆常人勸他受戒三者於憎戒者讚戒功德息他嫌恨四者見同法者於戒正行深心歡喜離諸嫉妬五者設有毀犯如法悔除如是五者於他能捨無義無利成滿義利具善士業故名善士戒初後二戒能引自利後三種戒能引利他四說一切種戒當知此戒以要言之六種七種總十三種言六種者一廣博戒住持圓滿廣攝一切所學處故得果圓滿回向大菩提故二無罪戒遠離耽著欲行邊故離染汙樂三隨順歡喜處戒遠離自苦疲勞邊故離無義苦五堅固戒由不顧諸利養恭敬一切利養恭敬不能伏故不復奪故由自修道已得堅固他來論者不能伏故不能奪故由能安住悉斷所斷本隨煩惱不能伏故不能奪故諸疏有云不捨自學精研外道故他來論不能伏奪不捨所學具如恆常戒中所說非此戒義六尸羅莊嚴具相應戒如聲聞地所說沙門莊嚴十七種應知其相聲聞地嗢柁南曰正信而無諂少病精進慧具少欲喜足易養及易滿杜多德端嚴知量善士法具聰慧者相忍柔和賢善言七種者一止息戒謂應正受遠離一切不應作事如殺生等諸惡行故二轉作戒一向修學所應作事攝諸善法故饒益有情故三防護戒恆不放逸隨護止息轉作戒故如是三戒由性分別四大士相異熟戒謂能成就於諸地中所起妙相五增上心異熟戒謂能成就菩薩無量勝三摩地六可愛趣異熟戒謂能成就人天之身七利有情異熟戒謂能成就利有情果如是四戒由果分別德光論師云此四戒中初一是攝善法戒二三兩戒是律儀戒後是饒益有情戒德光論師又云言六種者由德分別言七種者由性分別及果分別五說遂求戒當知此戒略有八種謂諸菩薩自諦思維自不希求現行斷命等八加害若離彼八是所希求他若相違而現行者我求不遂我意不悅如我希求他亦如是菩薩如是審思惟已乃至命難亦不於他現行八種所不遂求不悅意事云何八種所不遂求不悅意事謂現行斷命不與而取穢欲邪行虛妄離間粗惡綺語手塊杖等諸非愛觸與此相違長壽豐財妻室良淑無諸欺誑眷屬和好聞優美言有義利語諸可愛觸是名八種所遂求事所悅意事如是遣除八不遂求引發八種所遂求事說名菩薩遂求戒六說此世他世樂戒當知此戒以要言之四種五種總有九種言四種者一者於諸有情造作苦因應遮止處而正遮止二者於諸有情未作樂因應開許處而正開許令諸有情造彼樂因三者有諸有情於開遮處能正修行應攝受者正攝受之四者有諸有情於開遮處作顛倒行應調伏者正調伏之如是菩薩自身於此身語二業常清淨轉言五種者謂除尸羅所餘施忍精進靜慮般若波羅密多俱行淨戒如是菩薩所有淨戒能令自他現法後法皆得安樂是故說名菩薩此世他世樂戒七說清淨戒當知此戒略有十種謂諸菩薩唯為修道沙門之果及為究竟三菩提果而受淨戒非為避脫王等逼迫非為活命而受尸羅是名初善受戒又諸菩薩於諸學處有違犯時遠離所有微薄悔愧是名不太沉戒微薄悔愧即是太沉遠離彼者生大悔愧聲聞地云云何名為太極沉下謂如有一性無羞恥惡作羸劣為性慢緩於諸學處所作緩慢如是名為太極沉下是故遠離微薄悔愧當知即生極大慚愧有說若無微薄悔愧是不太沉當知此是顛倒之說又諸菩薩於佛非制非可悔處遠離愧悔是名不太舉戒謂於非處生愧悔者是太舉故故應遠離又諸菩薩於睡眠樂倚樂臥樂不生耽著晝夜無間勤修善品是名離懈怠戒又諸菩薩修習如前所說五支不放逸故是名離諸放逸所攝受戒又諸菩薩遠離利養恭敬貪故不願生天而自要期修梵行故是名正願戒又諸菩薩於行住等所有威儀於披法衣所作衆事修念誦等善品加行不違世法毗奈耶法妙善圓滿如法身語正現行故是名軌則具足所攝受戒又諸菩薩離矯詐等五種邪命所有過失是名淨命具足所攝受戒又諸菩薩如應遠離貪著受用以法非法從他求取衣服飲食諸臥具等所有一切不見過患欲樂邊際又應遠離修自苦行或臥荊刺灰塵等中或三入火或三入水自取煎逼受極苦楚所有一切自苦邊際是名離二邊戒又諸菩薩遠離一切外道見故是名永出離戒又諸菩薩於一切時有慚愧心於先受學佛所制處無缺減故於諸根本無破壞故是名於先所受無損失戒如是廣說有十一戒當知略說唯十種戒最勝子云遠離如是二種過故如佛所制正修學故便得清淨謂於所學不勤修學太沉之過及非制處而生悔愧太舉之過同應遠離故合不太沈舉為一又德光云於意樂中有二種過一受戒時惡受意樂二守護時太沉太舉亦合彼二以為一戒薩穆札疏云於先所受無損失戒當是總結前十而說上來諸說皆不應理無著菩薩於聲聞地宣說十種虧損因緣合說放逸懈怠所攝攝二為一與彼相違故不放逸與無懈怠亦應合一當知此是本論密意謂如聲聞地云云何十種虧損因緣一者最初惡受尸羅律儀二者太極沉下三者太極浮散四者放逸懈怠所攝五者發起邪願六者軌則虧損所攝七者淨命虧損所攝八者墮在二邊九者不能出離十者所受失壞若由遠離如是十種虧損因緣當知說名尸羅圓滿尸羅清淨四者言戒勝利此復有二一者究竟勝利謂是菩薩大尸羅藏能生究竟大菩提果由依此故菩薩淨戒波羅密多得圓滿已現證無上正等菩提大尸羅藏謂是廣大福德資糧亦名廣大無量圓滿淨戒二者現法勝利謂諸菩薩依此尸羅正勤修習乃至未證無上菩提亦能獲得五種勝利一者如前所說常為諸佛護念二者將捨命時住大歡喜三者身壞已後在在所生常與淨戒若等若增諸菩薩衆為其同分為同法侶為善知識四者於現法中成就無量大功德藏能滿淨戒波羅密多五者於後法中常得成就自性淨戒戒成其性此中第二勝利如最勝子等釋云由自思惟後世能遇諸佛菩薩超脫死畏住大歡喜又薩穆札疏云由二因緣住大歡喜一如前說二謂成就無量善根離惡趣畏五種勝利如其次第如德光疏謂是五果即增上果離繫果異熟果士用果等流果離繫果者謂由正願伏除惡行離憂惱繫寂天菩薩意謂初一勝利是通現後二世所有勝利謂住戒時諸佛菩薩便護念彼如子如弟令彼善法增長不失二四兩種是現法勝利謂捨命時見能生起勝善妙趣離惡趣畏住大歡喜此亦如入菩薩行論云應持菩提心度盡有情界正持彼心故假令於爾時眠睡或放逸然彼福德力恆廣如虛空謂於如是一一時中恆能增長無量功德資糧聚故三五兩種是後法勝利謂善知識之所攝受在在所生不失淨戒云何在在所生不失淨戒如摩訶迦葉經云由能斷除四種善法終不退失菩提之心三摩地大教王經云如數觀察人於彼覺知故能令心於彼如是如是住若能數數作意思惟由是自心乃能專注由見如是無上勝利諸有智者應當從受菩薩淨戒精勤修學五者攝集戒相如是如上所說一切自性戒等九種尸羅當知三種淨戒所攝謂律儀戒攝善法戒饒益有情戒最勝子薩穆札疏並云如是九種一一尸羅當知皆是三種淨戒所攝六者說戒行業云何菩薩淨戒定為三種答菩薩所作以要言之略有三事謂於現法無染樂住安住其心自身無倦成熟佛法及能成熟一切有情如其次第是律儀戒攝善法戒饒益有情戒之所作事是故由能止息惡作勤修律儀戒便能攝心緣住善法若或未能攝心緣善則餘二戒便失所依故如前引攝決擇分所云於律儀戒應先愛護此律儀戒即是七種別解脫戒即是佛教根本別解脫戒故諸菩薩於自所受淨律儀戒應勤修學二大法轍同一密意復次餘二戒中先應勤修攝善法戒以自成熟自未成熟能成熟他無有是處如是菩薩唯有爾所菩薩淨戒謂有九種或有三種唯有爾所淨戒勝利謂有六種唯有爾所淨戒所作謂有三種一者現法樂住安住其心二者身心無倦成熟佛法三者成熟有情除此自性淨戒淨戒勝利淨戒所作三事更無有上亦無有增謂無不於此中攝故過去菩薩求大菩提已於中學未來菩薩求大菩提當於中學普於十方無邊無際諸世界中現在菩薩求大菩提今於中學是謂三世一切菩薩悉於是學非謂有諸菩薩應於是學或餘菩薩不於是學是名菩薩如理修習於諸佛道第一之道於此道中不應遲疑應勤修學當知此是戒波羅密修學方便又諸菩薩復應於餘五波羅密及四攝等修學之法悉當了知至心修學縱於現時於餘學處不能修學不名為失然為護持自所學處於餘學處一切時中不應棄捨如是初行大乘菩薩首所應學菩薩戒品若據全文一一疏釋或將太繁故於今此略攝其義謹依菩薩地兩疏戒品二釋學集論入菩薩行論疏並餘說戒清淨疏論及諸契經於此受戒護戒還淨方便諸疑難處廣為抉擇論議如是諸有趣求正覺者應依大乘入正道廣發大乘願行心如所願誓善受持修學一切菩薩行此外更無正覺道佛菩薩未開許故或說密乘及顯乘開遮不同各異趣遂多誤解起慢見當知此是下劣人棄捨大乘妙善道是故若趣金剛乘應依清淨契經義彌勒無著龍樹等所說發心及受戒修習六度以為基次乃進學金剛乘此為圓滿大乘道捨此餘非真樂故佛菩薩行第一道清淨菩薩戒行相此於聖教及正理徵引不違非自臆謹依如來密意趣以顯了言為訓釋願以所有恭敬力恆時祈請妙吉祥大乘道深我智淺常懼文義有疏失我今悔願聖智前仰請悲愍垂證正今時佛教漸衰微大乘正道更寥寂為令聖教久住故願此精勤所修善普令一切有情界一一樂趣真實道由見正道圓滿故如是精進勤修行復願我於一切生常蒙妙吉祥加護如理通達勝乘法荷度有情弘聖教後序將游覺海先牢戒船欲趣寶城前飭行足防邪檢失則魔惡不生敦善勵行則德慧滋長止持則諸惡勿作作持則衆善奉行自度則上契菩提利他則下濟羣品然則菩薩行道蓋無外乎戒矣夫戒有人天所持則五戒十善是也有二乘所持則五種出家律儀是也有菩薩所持則三種毗奈耶聚是也煥乎菩薩戒藏律儀則攝人天二乘七種別解脫戒善法則攝六度善品饒益有情則攝四攝學處括億善而斯盡該萬行而靡遺誠顯密兩乘之津要福智二嚴之行楫也乃有愚人未了斯義或則大乘自許而取捨盲然或則語誦徒持而淨行弛失或謂密乘行道不須顯修或雖願樂大乘而不住戒如是彼彼悉迷正道身若狂象心類騰猿開惡趣之原杜歸真之路豈復識超世之聖道曉涅槃之通途不有聖覺其孰拯斯溺乎由是我宗喀巴大士心焉愍之為造斯論以解其惑開戒德之妙門示菩提之正道辨尸羅之性相柝罪犯之粗微明兩乘之共由論二利之所在略廣宣釋理無不盡文精義博旨正言明洵可謂度有海之戒舟翦稠林之慧劍矣本會集弘明之衆願謀利濟之加行仰藏衛之法隆以傳譯為先務慨夫正道寥寂淨律久弛願譯斯論以昭來學由是住心居士傳度其文大德榮尊證允其義二美既并功德斯圓用付梓人廣其傳布同法緇素其善奉持勗勵躬行令法久住焉乙亥年夏五月段祺瑞謹識於滬上菩提學會後序近時中土之言戒學者不曰宗南山即曰宗寶華夫南山寶華宗曇無德者也故其詳於四分而遺於瑜伽等之大乘增上戒學也宜矣雖自來時俗相訟皆三壇同稟然其賴以圓具者亦不過梵網一經而已梵網經自什師誦出而後諸大德爭相訓釋遵行頗遍邇來藏衛扶桑諸學者疑為臆造國人從而和之者亦不乏其徒今姑置真僞於不論但綜核輕重之文其不能盡大乘之制教也彰彰明甚雖然此不足為南山病亦不足為什師病也何者蓋南山作羯磨行事等疏時而奘師之瑜伽諸本尚未譯成既無聖言何可準憑寶華固祖述南山者也什師亦隨憶而誦者也烏足病哉烏足病哉今觀夫宗喀巴大師菩提正道菩薩戒論出而瑜伽學集等所陳戒相又覺未足而後知戒海無涯固不可以江河限亦不可遽以江河拒也頃者住心居士湯君膺菩提學會之請新譯此論嘉惠後學湯君以入世將軍之身作出世丈夫之事該通顯密淹貫聲明對於藏典尤所深間其所翻譯當為詳要斯舉豈獨戒法之幸抑亦此土未來祖師之神通乘也書成問序於余余恐後世持南山之說者將以限量心固封而不知習又恐讀斯論者以限量心輕譏南山之陋故特舉而出之使持戒修行之士泯限量之習速求多聞屏部類之諍勿輕小善共依別解脫永捨他勝處乃不負宗喀巴大師造論之悲心而以副菩提學會翻譯之弘願也至於此論內容之殊勝翻譯之緣起與夫校勘助譯之姓氏已於他序見之不復贅述丙子孟春師奘沙門密林書於即入居後序曩者映光居北平時得與住心居士依止吾辛上師于祕藏院蒙授以無上祕乘生起圓滿二種次第希有甚深微妙之法遂益解菩薩萬行需以戒學為本固無間於顯祕也師開示時恆謂宗喀巴大師所著之菩提正道菩薩戒論闡明戒相至為詳盡惜乎中土未有譯本適班禪師佛於北平杭州傳授時輪大法時諄諄以創立學會翻譯中土未有之經論相付囑乃於甲戌仲夏由法門同願創菩提學會于滬上當時衆意咸主先設譯經處專事傳譯以廣宣揚遂經第二次常會公推同學湯君住心主任其事依北平嵩祝寺刊藏文本菩薩戒論譯為華言公諸同願蓋此論者正依瑜伽戒品旁據學集入行等論開示淨戒得捨持犯性相種類罄無不盡藏衛學人靡不宗式映光亦嘗躬預譯會深悉譯經之難每見一字一義反復推尋遇有難解之處則就正于本會導師榮增上師與其役者有高觀如吳劍君兩居士于乙亥孟夏終其文義付諸梓人夫菩薩發心行菩薩行由住律儀戒善護律儀戒故身語意業遠離污染成極清淨由住攝善法戒善護攝善法戒故善能成就一切善法成滿大智由住饒益有情戒善護饒益有情戒故善能成熟一切有情成滿大悲若諸菩薩具足如是菩薩戒藏便能圓成無上菩提今以斯論廣彼戒德利諸淨行普願有情皆成正覺乙亥年夏五月臨海屈映光謹跋後序菩薩戒者乃萬行之統綱衆德之淵滙入覺地者之由梯圓果海者之正道也粵自大覺應世法澤周流開自利利他之門闡顯說密示之教階衆生于十地出羣有于三途雖方便多門而罔不以戒學為津梁尸羅為度品衆行修而諸惡息自成熟而饒益他至哉戒度菩薩行地寧有外於是乎慨茲末季法衰淨律失講止作佚其正軌修奉乖於行儀欲度苦流未嚴戒德如彼狂象墜入歧途道之不明菩薩之憂也維我上師聖宗喀巴挺高悟于叔世拔英規於季俗出自甘寧入于藏衛淵識遐鑒探深研機宏暢真乘光顯正法開三士之達道彰兩教之幽蘊爾乃通其夷路扇揚戒風憲章戒品造茲釋論統萬善于三聚包億度于九種所捨則一十八之他勝四十五之違犯所取則七衆別解脫六度四攝之學處又復兼攝瑜伽學集之義融合龍樹無著之趣廣依諸經論疏之說以闡菩薩所受之戒與夫受戒所依軌法乃至防護淨戒之相顯密二乘舍此非道三世菩薩悉于中學斯誠度世之慈航出離之妙品也薌銘曩于故都學法時聞之吾師辛上師云斯論文旨幽深義理精允藏土緇素凡預學流無間顯密莫不于此研尋傳習以為依式茲以菩提學會應緣成立業在弘傳爰以斯論徵之衆願擬付宜譯詢謀僉同由是乃于甲戌年秋八月設立譯經處公命薌銘主任其事謹據藏文北平嵩祝寺刊行之本依文翻譯遇有難義就正于菩提學會導師榮增上師而經吳劍君為之傳語復得高觀如君助理文辭以翌年乙亥夏四月終其文義薌銘譾陋不克窺見甚深難思之義恐所譯述有失真實願我佛門諸德匡其不逮正其未明又願師佛法僧證誠加護廣茲妙法普及羣倫乘此戒舟趣諸佛地云爾民國乙亥孟夏蘄水湯薌銘志于滬上譯經處
